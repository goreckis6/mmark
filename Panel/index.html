<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>Content System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base: #0a0a0f;
      --bg-elevated: #12121a;
      --bg-card: #16161f;
      --bg-hover: #1c1c28;
      --border: #252532;
      --border-subtle: #1e1e2a;
      --text-primary: #e8e8f0;
      --text-secondary: #9898a8;
      --text-muted: #686878;
      --accent: #6366f1;
      --accent-purple: #8b5cf6;
      --accent-dim: rgba(99, 102, 241, 0.15);
      --danger: #ef4444;
      --danger-dim: rgba(239, 68, 68, 0.12);
      --type-reklama: #6366f1;
      --type-post: #22c55e;
      --type-grafika: #f59e0b;
      --sidebar-w: 240px;
      --detail-w: 420px;
      --header-h: 56px;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      --transition: 0.2s ease;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.5;
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg-elevated);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 24px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { width: 18px; height: 18px; color: #fff; }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .nav-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 20px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 20px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 14px;
      border-left: 2px solid transparent;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
    }

    .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-item.active {
      background: var(--accent-dim);
      color: var(--text-primary);
      border-left-color: var(--accent);
    }

    .nav-item-left { display: flex; align-items: center; gap: 10px; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    .nav-count {
      font-size: 11px;
      font-weight: 600;
      background: var(--bg-card);
      color: var(--text-muted);
      padding: 2px 7px;
      border-radius: 10px;
      min-width: 22px;
      text-align: center;
    }

    .nav-item.active .nav-count {
      background: rgba(99, 102, 241, 0.25);
      color: var(--accent);
    }

    .platform-filters {
      padding: 0 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .platform-chip {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
    }

    .platform-chip:hover { border-color: var(--text-muted); color: var(--text-secondary); }
    .platform-chip.active {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px 12px 0;
      border-top: 1px solid var(--border-subtle);
    }

    .sidebar-brand-footer {
      padding: 12px 8px 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
      opacity: 0.6;
    }

    .sidebar-user {
      font-size: 12px;
      color: var(--text-secondary);
      padding: 0 8px 8px;
      word-break: break-word;
    }

    .btn-logout {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 12px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-logout:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: var(--danger-dim);
    }

    .btn-logout svg { width: 14px; height: 14px; }

    .btn-restore {
      width: 100%;
      padding: 10px 14px;
      font-size: 13px;
      font-family: inherit;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-restore:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .btn-restore:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-restore svg { width: 14px; height: 14px; }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .topbar {
      height: var(--header-h);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-elevated);
      flex-shrink: 0;
    }

    .topbar-left h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .breadcrumbs {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .breadcrumbs span { color: var(--text-secondary); }

    .search-wrap {
      position: relative;
      width: 280px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition);
    }

    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--accent); }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .toolbar--publish {
      justify-content: space-between;
      gap: 12px;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .queue-filters {
      display: flex;
      gap: 6px;
    }

    .queue-chip {
      padding: 6px 12px;
      font-size: 12px;
      font-family: inherit;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
    }

    .queue-chip:hover { border-color: var(--text-muted); color: var(--text-primary); }
    .queue-chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .queue-count {
      display: inline-block;
      min-width: 18px;
      padding: 0 5px;
      margin-left: 4px;
      font-size: 10px;
      font-weight: 700;
      text-align: center;
      border-radius: 999px;
      background: rgba(99, 102, 241, 0.25);
    }

    .card-copy {
      position: absolute;
      top: 10px;
      right: 44px;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.55);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      opacity: 0;
      transition: opacity var(--transition);
      z-index: 3;
    }

    .card:hover .card-copy { opacity: 1; }
    .card-copy svg { width: 14px; height: 14px; }

    .detail-copy-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    .detail-copy-btn {
      padding: 7px 12px;
      font-size: 12px;
      font-family: inherit;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      cursor: pointer;
    }

    .detail-copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    .platform-preview { margin: 16px 0; }

    .preview-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .preview-tab {
      padding: 6px 12px;
      font-size: 12px;
      font-family: inherit;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      color: var(--text-muted);
      cursor: pointer;
    }

    .preview-tab.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .preview-panel { display: none; }
    .preview-panel.active { display: block; }

    .mock {
      border-radius: var(--radius);
      overflow: hidden;
      font-size: 13px;
      line-height: 1.5;
    }

    .mock--li {
      background: #f3f2ef;
      color: #1d1d1d;
      padding: 14px;
    }

    .mock--ig {
      background: #000;
      color: #f5f5f5;
      border: 1px solid var(--border-subtle);
    }

    .mock--fb {
      background: #242526;
      color: #e4e6eb;
      padding: 14px;
    }

    .mock-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .mock-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      flex-shrink: 0;
    }

    .mock-avatar--li { background: linear-gradient(135deg, #0a66c2, #004182); }
    .mock-avatar--fb { background: linear-gradient(135deg, #1877f2, #0d5bb5); }

    .mock-body { margin-bottom: 10px; white-space: pre-wrap; word-break: break-word; }

    .mock-caption {
      padding: 10px 12px 14px;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .mock-img {
      width: 100%;
      display: block;
      max-height: 200px;
      object-fit: cover;
    }

    .mock-img--empty {
      padding: 24px;
      text-align: center;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.15);
      color: var(--text-muted);
    }

    .publish-btn--all {
      width: 100%;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6) !important;
      color: #fff !important;
      border: none !important;
      font-weight: 600;
    }

    .btn-new-post {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: opacity var(--transition);
    }

    .btn-new-post:hover { opacity: 0.9; }
    .btn-new-post svg { width: 16px; height: 16px; }

    .post-status {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 6px;
      z-index: 2;
    }

    .post-status--draft { background: rgba(245, 158, 11, 0.9); color: #1a1a1a; }
    .post-status--ready { background: rgba(34, 197, 94, 0.9); color: #052e16; }
    .post-status--published { background: rgba(99, 102, 241, 0.95); color: #fff; }
    .post-status--partial { background: rgba(56, 189, 248, 0.9); color: #0c4a6e; }
    .post-status--inline { position: static; display: inline-block; }

    .detail-status-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .pub-platform {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
    }

    .pub-platform--done {
      border-color: rgba(34, 197, 94, 0.4);
      color: var(--type-post);
    }

    .pub-checklist { margin: 16px 0; }

    .pub-checklist-list {
      list-style: none;
      margin: 8px 0 0;
      padding: 0;
    }

    .pub-check {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      padding: 6px 0;
      color: var(--text-secondary);
    }

    .pub-check-icon { width: 16px; flex-shrink: 0; font-weight: 700; }
    .pub-check--ok .pub-check-icon { color: var(--type-post); }
    .pub-check--err .pub-check-icon { color: var(--danger); }
    .pub-check--warn .pub-check-icon { color: var(--type-grafika); }

    .pub-checklist-ok { font-size: 12px; color: var(--type-post); margin-top: 8px; }
    .pub-checklist-warn { font-size: 12px; color: var(--type-grafika); margin-top: 8px; }

    .detail-edit-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      padding: 8px 14px;
      font-size: 13px;
      font-family: inherit;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      cursor: pointer;
    }

    .detail-edit-btn:hover { border-color: var(--accent); color: var(--accent); }

    .post-editor { max-width: 960px; margin: 0 auto; }

    .post-editor-intro {
      padding: 16px 18px;
      background: var(--accent-dim);
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: var(--radius);
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .editor-grid {
      display: grid;
      gap: 20px;
    }

    @media (min-width: 900px) {
      .editor-grid { grid-template-columns: 1fr 300px; }
    }

    .editor-field { margin-bottom: 14px; }

    .editor-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .editor-input,
    .editor-textarea {
      width: 100%;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      outline: none;
    }

    .editor-input:focus,
    .editor-textarea:focus { border-color: var(--accent); }

    .editor-textarea { resize: vertical; min-height: 200px; line-height: 1.55; }

    .editor-row-2 {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }

    .editor-platforms {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .editor-platform {
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .editor-drop {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      background: var(--bg-elevated);
      transition: border-color var(--transition);
    }

    .editor-drop:hover,
    .editor-drop--over { border-color: var(--accent); }

    .editor-drop-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    .editor-drop-placeholder svg { width: 32px; height: 32px; opacity: 0.5; }

    .editor-preview-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      max-height: 220px;
    }

    .editor-drop-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin: 8px 0;
      line-height: 1.45;
    }

    .editor-input--sm { margin-top: 6px; font-size: 12px; }

    .editor-format-tip { font-size: 11px; }

    .editor-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .editor-msg {
      font-size: 12px;
      margin-top: 10px;
      color: var(--text-muted);
    }

    .editor-msg--ok { color: var(--type-post); }
    .editor-msg--err { color: var(--danger); }

    .editor-transform-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .editor-plat-panel { display: none; }
    .editor-plat-panel.active { display: block; }

    .editor-textarea--sm { min-height: 140px; }

    .editor-brand-hint {
      padding: 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      margin-bottom: 16px;
    }

    .editor-brand-logo {
      max-width: 100%;
      max-height: 48px;
      margin: 8px 0;
      object-fit: contain;
    }

    .editor-brand-colors { display: flex; gap: 6px; margin: 8px 0; }

    .editor-brand-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid var(--border);
    }

    .editor-brand-note,
    .editor-brand-path {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.45;
      margin: 4px 0 0;
    }

    .detail-text-panel { display: none; margin-bottom: 12px; }
    .detail-text-panel.active { display: block; }

    .detail-copy-plat { margin-top: 8px; }

    .done-toggles {
      margin: 16px 0;
      padding-top: 16px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .done-toggle {
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-topic {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 3px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .brand-page { max-width: 880px; margin: 0 auto; }

    .brand-intro {
      padding: 16px 18px;
      background: var(--accent-dim);
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: var(--radius);
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .brand-grid { display: grid; gap: 16px; margin-bottom: 20px; }

    @media (min-width: 768px) {
      .brand-grid { grid-template-columns: 1fr 1fr; }
    }

    .brand-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 20px;
    }

    .brand-card-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .brand-card-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .brand-logo-preview {
      max-width: 100%;
      max-height: 80px;
      object-fit: contain;
      margin-bottom: 12px;
    }

    .brand-logo-empty {
      font-size: 12px;
      color: var(--text-muted);
      padding: 16px;
      background: var(--bg-hover);
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
    }

    .brand-field { margin-bottom: 12px; }

    .brand-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .brand-input,
    .brand-textarea {
      width: 100%;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      outline: none;
    }

    .brand-input:focus,
    .brand-textarea:focus { border-color: var(--accent); }

    .brand-swatches { display: flex; gap: 8px; margin-bottom: 12px; }

    .brand-swatch {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .brand-topics-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .brand-topic-tag {
      font-size: 12px;
      padding: 5px 10px;
      background: var(--bg-hover);
      border: 1px solid var(--border-subtle);
      border-radius: 999px;
      color: var(--text-secondary);
    }

    .brand-topic-remove {
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0 0 0 4px;
      font-size: 14px;
      line-height: 1;
    }

    .brand-topic-add { display: flex; gap: 8px; }
    .brand-topic-add .brand-input { flex: 1; }

    .brand-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.45;
    }

    .brand-msg { font-size: 12px; margin-top: 10px; color: var(--text-muted); }
    .brand-msg.ok { color: var(--type-post); }

    .empty-state .btn-new-post { margin-top: 16px; }

    .view-switch {
      display: flex;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .view-btn {
      padding: 7px 14px;
      font-size: 13px;
      font-family: inherit;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all var(--transition);
    }

    .view-btn svg { width: 15px; height: 15px; }
    .view-btn:hover { color: var(--text-secondary); }
    .view-btn.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .view-btn + .view-btn { border-left: 1px solid var(--border); }

    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px 32px;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
      position: relative;
    }

    .card:hover {
      border-color: var(--border);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .card-thumb {
      aspect-ratio: 16 / 10;
      background: var(--bg-hover);
      position: relative;
      overflow: hidden;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-thumb-empty {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
      padding: 16px;
    }

    .card-thumb-empty svg { width: 28px; height: 28px; opacity: 0.5; }

    .card-type {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
    }

    .card-type.reklama { color: var(--type-reklama); }
    .card-type.post { color: var(--type-post); }
    .card-type.grafika { color: var(--type-grafika); }

    .card-delete {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--transition), color var(--transition), background var(--transition);
    }

    .card-delete svg { width: 16px; height: 16px; }
    .card:hover .card-delete { opacity: 1; }
    .card-delete:hover { color: var(--danger); background: var(--danger-dim); }

    .card-body { padding: 14px; }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-excerpt {
      font-size: 12px;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
    }

    .card-platforms { display: flex; gap: 4px; }

    .card-platforms span {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--bg-hover);
      color: var(--text-muted);
    }

    /* ── Calendar ── */
    .calendar { max-width: 960px; }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .cal-title {
      font-size: 18px;
      font-weight: 600;
    }

    .cal-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cal-nav-btn {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .cal-nav-btn svg { width: 16px; height: 16px; }
    .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }

    .cal-today-btn {
      padding: 7px 14px;
      font-size: 13px;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
    }

    .cal-today-btn:hover { border-color: var(--accent); color: var(--accent); }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 4px;
    }

    .cal-weekday {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 0;
    }

    .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .cal-day {
      min-height: 100px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 6px;
      display: flex;
      flex-direction: column;
    }

    .cal-day.other-month { opacity: 0.35; }
    .cal-day.today { border-color: var(--accent); }

    .cal-day-num {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .cal-day.today .cal-day-num { color: var(--accent); }

    .cal-chips {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
      overflow: hidden;
    }

    .cal-chip {
      font-size: 10px;
      padding: 3px 6px;
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-left: 2px solid;
      background: var(--bg-hover);
      transition: opacity var(--transition);
    }

    .cal-chip:hover { opacity: 0.8; }
    .cal-chip.reklama { border-color: var(--type-reklama); color: var(--type-reklama); }
    .cal-chip.post { border-color: var(--type-post); color: var(--type-post); }
    .cal-chip.grafika { border-color: var(--type-grafika); color: var(--type-grafika); }

    .cal-more {
      font-size: 10px;
      color: var(--text-muted);
      padding: 2px 6px;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }

    .empty-state svg { width: 48px; height: 48px; opacity: 0.4; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; }

    /* ── Detail panel ── */
    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .detail-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--detail-w);
      max-width: 100vw;
      height: 100vh;
      background: var(--bg-elevated);
      border-left: 1px solid var(--border);
      z-index: 101;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .detail-panel.open { transform: translateX(0); }

    .detail-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: all var(--transition);
    }

    .detail-close svg { width: 18px; height: 18px; }
    .detail-close:hover { color: var(--text-primary); border-color: var(--text-muted); }

    .detail-image {
      aspect-ratio: 16 / 10;
      background: var(--bg-hover);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .detail-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .detail-image-empty {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .detail-image-empty svg { width: 40px; height: 40px; opacity: 0.45; }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .detail-type {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .detail-type.reklama { background: rgba(99, 102, 241, 0.15); color: var(--type-reklama); }
    .detail-type.post { background: rgba(34, 197, 94, 0.15); color: var(--type-post); }
    .detail-type.grafika { background: rgba(245, 158, 11, 0.15); color: var(--type-grafika); }

    .detail-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .detail-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .detail-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .detail-meta-item svg { width: 14px; height: 14px; color: var(--text-muted); }

    .detail-platforms {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .detail-platform {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .detail-path {
      font-size: 12px;
      color: var(--text-muted);
      font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, monospace;
      background: var(--bg-card);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
      margin-bottom: 20px;
      word-break: break-all;
    }

    .detail-text-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .detail-text {
      font-size: 14px;
      color: var(--text-secondary);
      white-space: pre-wrap;
      line-height: 1.65;
      margin-bottom: 24px;
    }

    .detail-delete {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-family: inherit;
      background: var(--danger-dim);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius-sm);
      color: var(--danger);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all var(--transition);
    }

    .detail-delete svg { width: 16px; height: 16px; }
    .detail-delete:hover { background: rgba(239, 68, 68, 0.22); }

    .sidebar-spacer { flex: 1; min-height: 16px; }

    .main-toolbar-hidden { display: none !important; }
    .topbar-search-hidden { display: none !important; }

    /* ── Generator postów ── */
    .generator {
      max-width: 1100px;
      margin: 0 auto;
    }

    .generator-intro {
      padding: 16px 18px;
      background: var(--accent-dim);
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: var(--radius);
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .generator-intro strong { color: var(--text-primary); }

    .generator-grid {
      display: grid;
      gap: 20px;
    }

    @media (min-width: 960px) {
      .generator-grid { grid-template-columns: 1fr 1fr; align-items: start; }
    }

    .generator-panel {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 20px;
    }

    .generator-panel-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .gen-field { margin-bottom: 14px; }

    .gen-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .gen-input,
    .gen-textarea,
    .gen-select {
      width: 100%;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color var(--transition);
    }

    .gen-input:focus,
    .gen-textarea:focus,
    .gen-select:focus {
      border-color: var(--accent);
    }

    .gen-textarea { resize: vertical; min-height: 72px; }

    .gen-row-2 {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }

    @media (max-width: 599px) {
      .gen-row-2 { grid-template-columns: 1fr; }
    }

    .gen-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .gen-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
    }

    .gen-tag.active {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }

    .gen-news-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 12px;
    }

    .gen-news-item {
      padding: 12px;
      background: var(--bg-hover);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      position: relative;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .gen-news-body {
      flex: 1;
      min-width: 0;
      position: relative;
      padding-right: 32px;
    }

    .gen-news-remove {
      position: absolute;
      top: 0;
      right: 0;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--transition), background var(--transition);
    }

    .gen-news-remove:hover { color: var(--danger); background: var(--danger-dim); }
    .gen-news-remove svg { width: 14px; height: 14px; }

    .gen-news-item .gen-field:last-child { margin-bottom: 0; }

    .gen-btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .gen-btn {
      padding: 9px 14px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all var(--transition);
      border: 1px solid var(--border);
      background: var(--bg-hover);
      color: var(--text-secondary);
    }

    .gen-btn svg { width: 14px; height: 14px; }
    .gen-btn:hover { border-color: var(--text-muted); color: var(--text-primary); }

    .gen-btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-purple));
      border-color: transparent;
      color: #fff;
    }

    .gen-btn-primary:hover { opacity: 0.92; color: #fff; }

    .gen-btn-ghost {
      background: transparent;
      border-style: dashed;
    }

    .gen-btn-danger {
      color: var(--danger);
      border-color: rgba(239, 68, 68, 0.35);
    }

    .gen-btn-danger:hover {
      color: #fff;
      background: var(--danger);
      border-color: var(--danger);
    }

    .gen-platforms {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .gen-check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .gen-check input { accent-color: var(--accent); width: 16px; height: 16px; }

    .gen-preview-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      background: var(--bg-hover);
      padding: 4px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
    }

    .gen-preview-tab {
      flex: 1;
      padding: 8px 12px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: 4px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .gen-preview-tab.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .gen-lang-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .gen-lang-row .gen-label { margin-bottom: 0; }

    .gen-lang-tabs {
      display: inline-flex;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .gen-lang-tab {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
    }

    .gen-lang-tab.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .gen-lang-tab:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .gen-preview-box {
      min-height: 280px;
      max-height: 420px;
      overflow-y: auto;
      padding: 14px;
      background: var(--bg-hover);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text-secondary);
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .gen-preview-box.empty {
      color: var(--text-muted);
      font-style: italic;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .gen-preview-meta {
      margin-top: 10px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .gen-snippet {
      margin-top: 16px;
    }

    .gen-snippet pre {
      margin-top: 8px;
      padding: 12px;
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 11px;
      line-height: 1.5;
      color: var(--text-muted);
      overflow-x: auto;
      max-height: 200px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .gen-cursor-box {
      margin-top: 20px;
      padding: 16px;
      background: var(--bg-card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .gen-cursor-prompt {
      margin-top: 8px;
      padding: 12px;
      background: var(--bg-hover);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .gen-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 18px;
      background: var(--bg-card);
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text-primary);
      box-shadow: var(--shadow);
      z-index: 200;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
    }

    .gen-toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .card-badge-draft {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 7px;
      border-radius: 4px;
      background: rgba(245, 158, 11, 0.2);
      color: var(--type-grafika);
    }

    .card.has-draft-badge .card-delete { top: 42px; }

    .gen-fetch-status {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 10px;
      line-height: 1.5;
    }

    .gen-fetch-status.ok { color: var(--type-post); }
    .gen-fetch-status.err { color: var(--danger); }

    .gen-news-source {
      font-size: 11px;
      margin-top: 4px;
      line-height: 1.45;
    }

    .gen-news-source a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .gen-news-source a:hover { text-decoration: underline; }

    .gen-news-source-url {
      display: block;
      color: var(--text-muted);
      word-break: break-all;
      margin-top: 2px;
      font-size: 10px;
    }

    .gen-progress {
      margin: 10px 0 4px;
    }

    .gen-progress[hidden] { display: none !important; }

    .gen-progress-track {
      height: 6px;
      background: var(--bg-hover);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .gen-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-purple));
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .gen-progress-label {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .gen-btn.is-loading { opacity: 0.65; pointer-events: none; }

    .gen-btn .gen-spin {
      width: 14px;
      height: 14px;
      animation: gen-spin 0.8s linear infinite;
    }

    @keyframes gen-spin {
      to { transform: rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .gen-btn .gen-spin { animation: none; }
    }

    .gen-options-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
      align-items: center;
      margin-bottom: 12px;
    }

    .gen-count-select {
      min-width: 72px;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 13px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
    }

    .gen-copy-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 4px;
      padding: 12px;
      background: var(--accent-dim);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: var(--radius-sm);
    }

    .gen-copy-actions[hidden] { display: none !important; }

    .gen-copy-actions-label {
      width: 100%;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .gen-news-thumb-wrap {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--bg-hover);
      border: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .gen-news-thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gen-news-thumb-wrap.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 10px;
      text-align: center;
      padding: 4px;
    }

    .gen-news-body { min-width: 0; }

    .gen-images-panel {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-subtle);
    }

    .gen-hero-preview {
      width: 100%;
      aspect-ratio: 16 / 10;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--bg-hover);
      border: 1px solid var(--border-subtle);
      margin-bottom: 12px;
    }

    .gen-hero-preview img { width: 100%; height: 100%; object-fit: cover; }

    .gen-hero-preview.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 16px;
    }

    .gen-image-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.45;
    }

    .sidebar-section-hidden { display: none !important; }

    /* ── Integracje social ── */
    .integrations { max-width: 880px; margin: 0 auto; }

    .integrations-intro {
      padding: 16px 18px;
      background: var(--accent-dim);
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: var(--radius);
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .integrations-grid { display: grid; gap: 16px; }

    @media (min-width: 768px) {
      .integrations-grid { grid-template-columns: 1fr 1fr; }
      .integrations-grid .integrations-card:first-child { grid-column: 1 / -1; }
    }

    .integrations-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 20px;
    }

    .integrations-card-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .integrations-card-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .int-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }

    .int-status-dot.ok { background: var(--type-post); box-shadow: 0 0 8px rgba(34, 197, 94, 0.4); }

    .int-field { margin-bottom: 12px; }

    .int-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .int-input {
      width: 100%;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      outline: none;
    }

    .int-input:focus { border-color: var(--accent); }

    .int-btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

    .int-btn {
      padding: 9px 14px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-hover);
      color: var(--text-secondary);
    }

    .int-btn:hover { border-color: var(--text-muted); color: var(--text-primary); }

    .int-btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-purple));
      border-color: transparent;
      color: #fff;
    }

    .int-msg { font-size: 12px; margin-top: 10px; color: var(--text-muted); }
    .int-msg.ok { color: var(--type-post); }
    .int-msg.err { color: var(--danger); }

    /* ── Publikacja w szczegółach ── */
    .detail-publish {
      margin-bottom: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border-subtle);
    }

    .detail-publish-hint {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .publish-btns { display: flex; flex-direction: column; gap: 8px; }

    .publish-btn {
      width: 100%;
      padding: 11px 14px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      transition: all var(--transition);
    }

    .publish-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-dim); }
    .publish-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .publish-btn--fb { border-left: 3px solid #1877f2; }
    .publish-btn--ig { border-left: 3px solid #e4405f; }
    .publish-btn--li { border-left: 3px solid #0a66c2; }

    .publish-status {
      font-size: 12px;
      margin-top: 10px;
      color: var(--text-muted);
    }

    .publish-status.ok { color: var(--type-post); }
    .publish-status.err { color: var(--danger); }

    /* ── Formaty graficzne ── */
    .formats-page { max-width: 960px; margin: 0 auto; }

    .formats-intro {
      padding: 16px 18px;
      background: var(--accent-dim);
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: var(--radius);
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .formats-grid {
      display: grid;
      gap: 16px;
    }

    @media (min-width: 768px) {
      .formats-grid { grid-template-columns: 1fr 1fr; }
    }

    .formats-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 20px;
      overflow-x: auto;
    }

    .formats-card--wide { margin-bottom: 16px; }

    .formats-card-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fmt-platform-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--platform-color, var(--accent));
      flex-shrink: 0;
    }

    .formats-card-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .fmt-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .fmt-table th,
    .fmt-table td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border-subtle);
      vertical-align: top;
    }

    .fmt-table th {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .fmt-note {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      font-weight: 400;
    }

    .fmt-presets {
      display: grid;
      gap: 10px;
    }

    @media (min-width: 640px) {
      .fmt-presets { grid-template-columns: 1fr 1fr; }
    }

    .fmt-preset {
      padding: 12px 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
    }

    .fmt-preset-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .fmt-preset-meta { font-size: 11px; color: var(--text-muted); }

    .fmt-preset-foot {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .fmt-preset-folder { font-family: var(--font-mono, monospace); }

    .formats-footer {
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .detail-formats {
      margin: 16px 0;
      padding: 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
    }

    .fmt-recommend {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .fmt-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .fmt-chip {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(99, 102, 241, 0.12);
      border: 1px solid rgba(99, 102, 241, 0.25);
      color: var(--text-secondary);
    }

    .fmt-detail-group { margin-top: 10px; }

    .fmt-detail-platform {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .fmt-detail-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
    }

    .fmt-gen-list {
      margin: 8px 0 0 16px;
      padding: 0;
      font-size: 11px;
      line-height: 1.6;
    }

    /* ── Auth gate (logowanie) ── */
    .auth-gate {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99, 102, 241, 0.18), transparent),
        var(--bg-base);
    }

    .auth-gate[hidden] { display: none !important; }

    .auth-gate-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
    }

    .auth-gate-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .auth-gate-logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-purple));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-gate-logo-icon svg { width: 22px; height: 22px; }

    .auth-gate-logo h2 { font-size: 18px; font-weight: 600; }
    .auth-gate-logo p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    .auth-field { margin-bottom: 16px; }
    .auth-field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .auth-field input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0f0f16;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
    }

    .auth-field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .auth-submit {
      width: 100%;
      margin-top: 8px;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-purple));
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }

    .auth-submit:disabled { opacity: 0.6; cursor: wait; }

    .auth-error {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--danger-dim);
      color: #fca5a5;
      font-size: 13px;
      display: none;
    }

    .auth-error.show { display: block; }

    .auth-hint {
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }

    .main-app[hidden] { display: none !important; }
  </style>
</head>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
