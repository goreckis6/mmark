          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
          <input type="search" class="search-input" id="search" placeholder="Szukaj postów…" autocomplete="off">
        </div>
      </header>

      <div class="toolbar toolbar--publish" id="main-toolbar">
        <div class="toolbar-left">
          <button type="button" class="btn-new-post" id="btn-new-post">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            Nowy post
          </button>
          <div class="queue-filters" id="queue-filters">
            <button type="button" class="queue-chip active" data-queue="all">Wszystko</button>
            <button type="button" class="queue-chip" data-queue="publish">Do publikacji</button>
          </div>
        </div>
        <div class="view-switch">
          <button class="view-btn active" data-view="grid" id="btn-grid">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
            Siatka
          </button>
          <button class="view-btn" data-view="calendar" id="btn-calendar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            Kalendarz
          </button>
        </div>
      </div>

      <div class="content-area" id="content-area"></div>
    </main>
  </div>

  <div class="detail-overlay" id="detail-overlay"></div>
  <aside class="detail-panel" id="detail-panel">
    <button class="detail-close" id="detail-close" aria-label="Zamknij">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
      </svg>
    </button>
    <div id="detail-content"></div>
  </aside>

  <div class="gen-toast" id="gen-toast" role="status" aria-live="polite"></div>

  <script src="content-data.js"></script>
  <script src="image-formats.js"></script>
  <script src="auth-client.js?v=3"></script>
  <script src="brand-kit.js"></script>
  <script src="post-manager.js"></script>
  <script>
    (function () {
      "use strict";

      var STORAGE_KEY = "content-system-deleted-ids";
      var GENERATED_KEY = "content-system-generated-posts";
      var GENERATOR_DRAFT_KEY = "content-system-generator-draft";

      var GEN_TOPICS = ["AWS", "Chmura", "DevOps", "Programowanie", "Open Source", "Bezpieczeństwo", "AI / DevTools"];

      var IG_NUMS = ["1️⃣", "2️⃣", "3️⃣", "4️⃣", "5️⃣", "6️⃣"];

      var PLATFORM_LABELS = {
        ig: "IG",
        fb: "FB",
        tt: "TT",
        yt: "YT",
        li: "LI",
        x: "X"
      };

      var MONTH_NAMES = [
        "Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec",
        "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"
      ];

      var WEEKDAYS = ["Pn", "Wt", "Śr", "Cz", "Pt", "So", "Nd"];

      var state = {
        mode: "browse",
        platformFilter: null,
        topicFilter: null,
        queueFilter: "all",
        search: "",
        view: "grid",
        calYear: new Date().getFullYear(),
        calMonth: new Date().getMonth(),
        selectedId: null,
        genPreviewTab: "li",
        editId: null
      };

      function getGeneratedPosts() {
        return window.PostManager ? PostManager.getUserPosts() : [];
      }

      function saveGeneratedPosts(posts) {
        if (!window.PostManager) return;
        posts.forEach(function (p) { PostManager.savePost(p); });
      }

      function getAllItems() {
        if (window.PostManager) {
          return PostManager.getAllItems(window.CONTENT || [], getDeletedIds());
        }
        return getGeneratedPosts().concat(window.CONTENT || []);
      }

      function isGeneratedId(id) {
        return String(id).indexOf("gen-") === 0;
      }

      function showToast(msg) {
        var el = document.getElementById("gen-toast");
        if (!el) return;
        el.textContent = msg;
        el.classList.add("show");
        clearTimeout(showToast._t);
        showToast._t = setTimeout(function () { el.classList.remove("show"); }, 2600);
      }

      function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(text).then(function () {
            showToast("Skopiowano do schowka");
          }).catch(function () {
            fallbackCopy(text);
          });
        }
        fallbackCopy(text);
        return Promise.resolve();
      }

      function fallbackCopy(text) {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
          showToast("Skopiowano do schowka");
        } catch (e) {
          showToast("Nie udało się skopiować");
        }
        document.body.removeChild(ta);
      }

      function slugifyFilename(str) {
        return (str || "export")
          .toLowerCase()
          .replace(/[^a-z0-9ąćęłńóśźż]+/gi, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 52) || "export";
      }

      function downloadTextFile(filename, content) {
        var blob = new Blob([content], { type: "text/markdown;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.style.display = "none";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function () { URL.revokeObjectURL(url); }, 500);
      }

      function buildGeneratorMarkdown(options) {
        var o = options || {};
        var lines = [];
        lines.push("# " + (o.title || "News tygodnia IT"));
        lines.push("");
        if (o.weekLabel) lines.push("**Tydzień:** " + o.weekLabel);
        if (o.lang) lines.push("**Język:** " + (o.lang === "pl" ? "PL" : "EN"));
        if (o.dateLi || o.dateIg) {
          lines.push("**Daty publikacji:** LinkedIn " + (o.dateLi || "—") + " · Instagram " + (o.dateIg || "—"));
        }
        if (o.image) lines.push("**Grafika:** `" + o.image + "`");
        if (o.topics && o.topics.length) lines.push("**Tematy:** " + o.topics.join(", "));
        lines.push("");
        lines.push("---");
        lines.push("");
        if (o.hook) {
          lines.push("## Hook");
          lines.push("");
          lines.push(o.hook);
          lines.push("");
        }
        if (o.news && o.news.length) {
          lines.push("## Newsy");
          lines.push("");
          o.news.forEach(function (n, i) {
            lines.push("### " + (i + 1) + ". " + n.title);
            lines.push("");
            if (n.desc) lines.push(n.desc);
            if (n.url) {
              lines.push("");
              lines.push("Źródło: [" + formatSourceLabel(n.url) + "](" + n.url + ")");
            }
            lines.push("");
          });
        }
        if (o.li) {
          lines.push("---");
          lines.push("");
          lines.push("## LinkedIn");
          lines.push("");
          lines.push("```text");
          lines.push(o.li);
          lines.push("```");
          lines.push("");
        }
        if (o.ig) {
          lines.push("## Instagram");
          lines.push("");
          lines.push("```text");
          lines.push(o.ig);
          lines.push("```");
          lines.push("");
        }
        return lines.join("\n").trim() + "\n";
      }

      function buildPostMarkdown(item) {
        var lines = [];
        lines.push("# " + (item.title || "Post"));
        lines.push("");
        if (item.topic) lines.push("**Temat:** " + item.topic);
        if (item.date) lines.push("**Data:** " + item.date);
        if (item.status) lines.push("**Status:** " + (item.status === "ready" ? "Gotowy" : item.status === "draft" ? "Szkic" : item.status));
        if (item.platforms && item.platforms.length) {
          lines.push("**Platformy:** " + item.platforms.map(function (p) {
            return PLATFORM_LABELS[p] || p;
          }).join(", "));
        }
        if (item.image) lines.push("**Grafika:** `" + item.image + "`");
        lines.push("");
        lines.push("---");
        lines.push("");
        if (item.textMaster) {
          lines.push("## Tekst master");
          lines.push("");
          lines.push(item.textMaster);
          lines.push("");
        }
        var platformTexts = [
          { key: "li", label: "LinkedIn", text: item.textLi },
          { key: "fb", label: "Facebook", text: item.textFb },
          { key: "ig", label: "Instagram", text: item.textIg }
        ];
        platformTexts.forEach(function (pt) {
          if (!pt.text) return;
          lines.push("## " + pt.label);
          lines.push("");
          lines.push("```text");
          lines.push(pt.text);
          lines.push("```");
          lines.push("");
        });
        return lines.join("\n").trim() + "\n";
      }

      function saveMarkdownFile(filename, content) {
        downloadTextFile(filename, content);
        showToast("Zapisano plik " + filename);
      }

      function getDeletedIds() {
        if (window.PostManager && PostManager.isServerMode()) {
          return PostManager.getDeletedIds();
        }
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch (e) {
          return [];
        }
      }

      function saveDeletedIds(ids) {
        if (window.PostManager && PostManager.isServerMode()) {
          PostManager.saveDeletedIds(ids);
          return;
        }
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
        } catch (e) { /* best-effort on file:// */ }
      }

      function isDeleted(id) {
        return getDeletedIds().indexOf(id) !== -1;
      }

      function deleteItem(id) {
        if (window.PostManager) {
          PostManager.deletePost(id, getDeletedIds(), saveDeletedIds);
        } else if (isGeneratedId(id)) {
          saveGeneratedPosts(getGeneratedPosts().filter(function (p) { return p.id !== id; }));
        } else {
          var ids = getDeletedIds();
          if (ids.indexOf(id) === -1) {
            ids.push(id);
            saveDeletedIds(ids);
          }
        }
        closeDetail();
        render();
      }

      function restoreAll() {
        saveDeletedIds([]);
        render();
      }

      function iconCopy() {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      }

      function getQueueCount() {
        if (!window.PostManager) return 0;
        return PostManager.countQueueItems(getAllNonDeletedItems());
      }

      function getVisibleItems() {
        var items = getAllItems().filter(function (item) {
          return !isDeleted(item.id) && item.type === "post";
        });

        if (state.queueFilter === "publish" && window.PostManager) {
          items = items.filter(function (item) { return PostManager.needsPublish(item); });
        }

        if (state.topicFilter) {
          items = items.filter(function (item) {
            return item.topic === state.topicFilter;
          });
        }

        if (state.platformFilter) {
          items = items.filter(function (item) {
            return item.platforms && item.platforms.indexOf(state.platformFilter) !== -1;
          });
        }

        if (state.search.trim()) {
          var q = state.search.trim().toLowerCase();
          items = items.filter(function (item) {
            var hay = [
              item.title,
              item.topic,
              item.text,
              item.textMaster,
              item.textLi,
              item.textFb,
              item.textIg
            ].filter(Boolean).join(" ").toLowerCase();
            return hay.indexOf(q) !== -1;
          });
        }

        return items.sort(function (a, b) {
          return b.date.localeCompare(a.date);
        });
      }

      function getAllNonDeletedItems() {
        return getAllItems().filter(function (item) {
          return !isDeleted(item.id) && item.type === "post";
        });
      }

      function getUsedPlatforms() {
        var set = {};
        getAllNonDeletedItems().forEach(function (item) {
          (item.platforms || []).forEach(function (p) { set[p] = true; });
        });
        return Object.keys(set).sort();
      }

      function formatDate(dateStr) {
        var parts = dateStr.split("-");
        if (parts.length !== 3) return dateStr;
        return parts[2] + "." + parts[1] + "." + parts[0];
      }

      function excerpt(text, max) {
        if (!text) return "";
        var flat = text.replace(/\n/g, " ");
        return flat.length > max ? flat.slice(0, max) + "…" : flat;
      }

      function iconImage() {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>';
      }

      function iconTrash() {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>';
      }

      function renderThumb(item) {
        if (item.image) {
          return '<img src="' + escapeAttr(item.image) + '" alt="" loading="lazy">';
        }
        return (
          '<div class="card-thumb-empty">' +
            iconImage() +
            '<span>brak grafiki · wgraj własną</span>' +
          '</div>'
        );
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function escapeAttr(str) {
        return escapeHtml(str).replace(/'/g, "&#39;");
      }

      function renderNav() {
        var genNav = document.getElementById("nav-generator");
        if (genNav) {
          genNav.classList.toggle("active", state.mode === "generator");
        }
        var intNav = document.getElementById("nav-brand");
        if (intNav) {
          intNav.classList.toggle("active", state.mode === "brand");
        }
        var fmtNav = document.getElementById("nav-formats");
        if (fmtNav) {
          fmtNav.classList.toggle("active", state.mode === "formats");
        }
      }

      function getUsedTopics() {
        var set = {};
        getAllNonDeletedItems().forEach(function (item) {
          if (item.topic) set[item.topic] = true;
        });
        return Object.keys(set).sort();
      }

      function renderTopicFilters() {
        var container = document.getElementById("topic-filters");
        if (!container) return;
        var topics = getUsedTopics();

        if (!topics.length) {
          container.innerHTML = '<span style="font-size:12px;color:var(--text-muted);padding:4px 8px">Brak tematów</span>';
          return;
        }

        container.innerHTML = topics.map(function (t) {
          var active = state.topicFilter === t ? " active" : "";
          return '<button class="platform-chip' + active + '" data-topic="' + escapeAttr(t) + '">' + escapeHtml(t) + '</button>';
        }).join("");

        container.querySelectorAll(".platform-chip").forEach(function (el) {
          el.addEventListener("click", function () {
            var t = el.dataset.topic;
            state.topicFilter = state.topicFilter === t ? null : t;
            render();
          });
        });
      }

      function renderPlatformFilters() {
        var container = document.getElementById("platform-filters");
        var platforms = getUsedPlatforms();

        if (!platforms.length) {
          container.innerHTML = '<span style="font-size:12px;color:var(--text-muted);padding:4px 8px">Brak platform</span>';
          return;
        }

        container.innerHTML = platforms.map(function (p) {
          var active = state.platformFilter === p ? " active" : "";
          return '<button class="platform-chip' + active + '" data-platform="' + p + '">' + (PLATFORM_LABELS[p] || p) + '</button>';
        }).join("");

        container.querySelectorAll(".platform-chip").forEach(function (el) {
          el.addEventListener("click", function () {
            var p = el.dataset.platform;
            state.platformFilter = state.platformFilter === p ? null : p;
            render();
          });
        });
      }

      function renderQueueFilters() {
        var container = document.getElementById("queue-filters");
        if (!container) return;
        var count = getQueueCount();
        container.innerHTML =
          '<button type="button" class="queue-chip' + (state.queueFilter === "all" ? " active" : "") +
            '" data-queue="all">Wszystko</button>' +
          '<button type="button" class="queue-chip' + (state.queueFilter === "publish" ? " active" : "") +
            '" data-queue="publish">Do publikacji' +
            (count ? '<span class="queue-count">' + count + "</span>" : "") +
          "</button>";

        container.querySelectorAll(".queue-chip").forEach(function (el) {
          el.addEventListener("click", function () {
            state.queueFilter = el.dataset.queue;
            render();
          });
        });
      }

      function renderHeader() {
        if (state.mode === "generator") {
          document.getElementById("view-title").textContent = "Generator newsów";
          document.getElementById("breadcrumbs").innerHTML =
            'NARZĘDZIA / <span>News tygodnia</span>';
          return;
        }
        if (state.mode === "brand") {
          document.getElementById("view-title").textContent = "Motyw marki";
          document.getElementById("breadcrumbs").innerHTML =
            'NARZĘDZIA / <span>Logo · kolory · tematy</span>';
          return;
        }
        if (state.mode === "formats") {
          document.getElementById("view-title").textContent = "Formaty graficzne";
          document.getElementById("breadcrumbs").innerHTML =
            'NARZĘDZIA / <span>Wymiary social media</span>';
          return;
        }
        if (state.mode === "editor") {
          document.getElementById("view-title").textContent = state.editId ? "Edycja posta" : "Nowy post";
          document.getElementById("breadcrumbs").innerHTML =
            'PUBLIKACJE / <span>' + (state.editId ? "Edycja" : "Nowy") + "</span>";
          return;
        }

        document.getElementById("view-title").textContent =
          state.queueFilter === "publish" ? "Do publikacji" : "Posty";
        document.getElementById("breadcrumbs").innerHTML =
          state.queueFilter === "publish"
            ? 'PUBLIKACJE / <span>Gotowe do wrzucenia</span>'
            : 'PUBLIKACJE / <span>Do wrzucenia</span>';

        document.getElementById("btn-grid").classList.toggle("active", state.view === "grid");
        document.getElementById("btn-calendar").classList.toggle("active", state.view === "calendar");

        var deletedCount = getDeletedIds().length;
        var btn = document.getElementById("btn-restore");
        btn.disabled = deletedCount === 0;
        document.getElementById("restore-label").textContent =
          deletedCount > 0 ? "Przywróć usunięte (" + deletedCount + ")" : "Przywróć usunięte";
      }

      function renderGrid(items) {
        if (!items.length) {
          var emptyMsg = state.queueFilter === "publish"
            ? "Brak postów gotowych do wrzucenia. Ustaw status „Gotowy” i oznacz platformy po ręcznej publikacji."
            : "Brak postów.";
          return (
            '<div class="empty-state">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>' +
              '<p>' + emptyMsg + '</p>' +
              (state.queueFilter !== "publish"
                ? '<button type="button" class="btn-new-post" id="empty-new-post">' +
                  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>' +
                  'Dodaj pierwszy post</button>'
                : "") +
            '</div>'
          );
        }

        return (
          '<div class="grid">' +
          items.map(function (item) {
            var platforms = (item.platforms || []).map(function (p) {
              return '<span>' + (PLATFORM_LABELS[p] || p) + '</span>';
            }).join("");

            var statusBadge = window.PostManager
              ? PostManager.renderStatusBadge(item)
              : "";
            var cardClass = "card";

            return (
              '<article class="' + cardClass + '" data-id="' + escapeAttr(item.id) + '">' +
                '<div class="card-thumb">' +
                  renderThumb(item) +
                  statusBadge +
                  '<button class="card-copy" data-copy="' + escapeAttr(item.id) + '" aria-label="Kopiuj treść">' + iconCopy() + '</button>' +
                  '<button class="card-delete" data-delete="' + escapeAttr(item.id) + '" aria-label="Usuń">' + iconTrash() + '</button>' +
                '</div>' +
                '<div class="card-body">' +
                  '<h3 class="card-title">' + escapeHtml(item.title) + '</h3>' +
                  '<p class="card-excerpt">' + escapeHtml(excerpt(
                    window.PostManager ? PostManager.getTextForPlatform(item, (item.platforms || [])[0] || "li") : (item.text || ""),
                    100
                  )) + '</p>' +
                  (item.topic ? '<span class="card-topic">' + escapeHtml(item.topic) + '</span>' : '') +
                  '<div class="card-meta">' +
                    '<time>' + formatDate(item.date) + '</time>' +
                    '<div class="card-platforms">' + platforms + '</div>' +
                  '</div>' +
                '</div>' +
              '</article>'
            );
          }).join("") +
          '</div>'
        );
      }

      function renderCalendar(items) {
        var year = state.calYear;
        var month = state.calMonth;
        var firstDay = new Date(year, month, 1);
        var lastDay = new Date(year, month + 1, 0);
        var startOffset = (firstDay.getDay() + 6) % 7;
        var daysInMonth = lastDay.getDate();
        var prevMonthDays = new Date(year, month, 0).getDate();

        var byDate = {};
        items.forEach(function (item) {
          if (!byDate[item.date]) byDate[item.date] = [];
          byDate[item.date].push(item);
        });

        var today = new Date();
        var todayStr = today.getFullYear() + "-" +
          String(today.getMonth() + 1).padStart(2, "0") + "-" +
          String(today.getDate()).padStart(2, "0");

        var cells = [];
        var totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;

        for (var i = 0; i < totalCells; i++) {
          var dayNum, cellYear, cellMonth, otherMonth = false;

          if (i < startOffset) {
            dayNum = prevMonthDays - startOffset + i + 1;
            cellMonth = month - 1;
            cellYear = year;
            if (cellMonth < 0) { cellMonth = 11; cellYear--; }
            otherMonth = true;
          } else if (i >= startOffset + daysInMonth) {
            dayNum = i - startOffset - daysInMonth + 1;
            cellMonth = month + 1;
            cellYear = year;
            if (cellMonth > 11) { cellMonth = 0; cellYear++; }
            otherMonth = true;
          } else {
            dayNum = i - startOffset + 1;
            cellMonth = month;
            cellYear = year;
          }

          var dateStr = cellYear + "-" +
            String(cellMonth + 1).padStart(2, "0") + "-" +
            String(dayNum).padStart(2, "0");

          var dayItems = byDate[dateStr] || [];
          var maxChips = 3;

            return '<div class="cal-chip ' + item.type + '" data-id="' + escapeAttr(item.id) + '">' + escapeHtml(item.title) + '</div>';

              '<div class="cal-day-num">' + dayNum + '</div>' +

        var now = new Date();
        var day = now.getDay();
        var monday = new Date(now);
        monday.setHours(0, 0, 0, 0);
        monday.setDate(now.getDate() - ((day + 6) % 7));

        friday.setDate(monday.getDate() + 4);
        return { from: monday, to: friday };

          return parseInt(a[2], 10) + "–" + parseInt(b[2], 10) + " " + MONTH_NAMES[parseInt(a[1], 10) - 1] + " " + a[0];

      function truncateText(str, max) {
        if (!str) return "";
        str = str.replace(/\s+/g, " ").trim();
        return str.length > max ? str.slice(0, max - 1) + "…" : str;
      }

      function stripHtml(str) {
        if (!str) return "";

      function fetchJson(url, timeoutMs) {
        timeoutMs = timeoutMs || 14000;
        return Promise.race([
          fetch(url, { headers: { Accept: "application/json" } }).then(function (res) {
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.json();
          }),
          new Promise(function (_, reject) {
            setTimeout(function () { reject(new Error("timeout")); }, timeoutMs);
          })
        ]);
      }

      function isRecentUnix(ts, days) {

      function newsDedupeKey(title) {
        return title.toLowerCase().replace(/[^a-z0-9ąćęłńóśźż]+/gi, " ").trim().slice(0, 48);
      }

      function newsUrlKey(url) {
        if (!url) return "";
        try {
          var u = new URL(url);
          return (u.hostname + u.pathname).replace(/\/$/, "").slice(0, 72);
        } catch (e) {
          return url.slice(0, 72);
        }
      }

      function buildNewsExcludeMap(newsList) {
        var map = {};
        (newsList || []).forEach(function (n) {
          if (n.title) map[newsDedupeKey(n.title)] = true;
          var uk = newsUrlKey(n.url);
          if (uk) map["url:" + uk] = true;
        });
        return map;
      }

      function isNewsExcluded(item, excludeMap) {
        if (!excludeMap || !item) return false;
        if (item.title && excludeMap[newsDedupeKey(item.title)]) return true;
        var uk = newsUrlKey(item.url);
        return !!(uk && excludeMap["url:" + uk]);
      }

      function completeViaBedrock(system, prompt, maxTokens) {

      function parseBedrockNewsDescs(text, news) {
        if (!text || !news.length) return news;
        try {
          var match = text.match(/\[[\s\S]*\]/);
          if (!match) return news;
          var arr = JSON.parse(match[0]);
          return news.map(function (n, i) {
            var entry = arr.find(function (e) {
              return e && (e.i === i + 1 || e.index === i + 1);
            }) || arr[i];
            var desc = entry && (entry.desc || entry.description);
            if (desc && String(desc).trim().length > 20) {
              return Object.assign({}, n, { desc: truncateText(String(desc).trim(), 220) });
            }
            return n;
          });
        } catch (e) {
          return news;
        }
      }

      function enrichNewsDescriptionsViaBedrock(news, existingNews, onProgress) {
        if (!news.length) return Promise.resolve(news);
        return checkBedrockAvailable().then(function (useBedrock) {
          if (!useBedrock) return news;
          if (onProgress) onProgress(10, "Generuję opisy newsów (Bedrock)…");

          var existingBlock = "";
          (existingNews || []).forEach(function (n, idx) {
            existingBlock += (idx + 1) + ". " + n.title + "\n";
          });

          var newBlock = news.map(function (n, i) {
            var snippet = truncateText(stripHtml(n.desc || ""), 140);
            return (
              (i + 1) + ". Title: " + n.title + "\n" +
              "   Snippet: " + (snippet || "(none)") + "\n" +
              "   Source: " + (formatSourceLabel(n.url) || "unknown")
            );
          }).join("\n\n");

          var prompt =
            (existingBlock
              ? "EXISTING STORIES (already in the list — do NOT rewrite or duplicate these):\n" + existingBlock + "\n\n"
              : "") +
            "Write descriptions for these " + news.length + " NEW items:\n\n" +
            newBlock;

          return completeViaBedrock(NEWS_DESC_SYSTEM_PROMPT, prompt, 2048).then(function (text) {
            if (onProgress) onProgress(85, "Opisy newsów gotowe");
            return parseBedrockNewsDescs(text, news);
          }).catch(function () {
            return news;
          });
        });
      }

        var plWords = /(\b(i|w|na|do|ze|się|oraz|tygodniu|warto|cloud|chmura)\b)/i;
        var enWords = /(\b(the|and|for|with|this|that|new|how|what|why|announces|released)\b)/i;

      function translateViaMyMemory(text) {
        var chunk = truncateText(text, 480);
        var url = "https://api.mymemory.translated.net/get?q=" + encodeURIComponent(chunk) + "&langpair=en|pl";
        return fetchJson(url, 12000).then(function (data) {
          var tr = data && data.responseData && data.responseData.translatedText;
          if (!tr || tr.toUpperCase() === chunk.toUpperCase()) return text.trim();
          return tr.trim();
        }).catch(function () { return text.trim(); });

      function translateToPolish(text) {
        if (!text || !text.trim()) return Promise.resolve("");
        if (isLikelyPolish(text)) return Promise.resolve(text.trim());
        return checkBedrockAvailable().then(function (useBedrock) {
          if (useBedrock) {
            return translateViaBedrock(text).catch(function () {
              return translateViaMyMemory(text);
            });
          }
          return translateViaMyMemory(text);
        });
      }

      function translateLongText(text, onProgress) {
        if (!text || !text.trim()) return Promise.resolve("");
        if (isLikelyPolish(text)) return Promise.resolve(text.trim());
        var blocks = text.split(/\n\n+/).filter(function (b) { return b.trim(); });
        var chain = Promise.resolve("");
        blocks.forEach(function (block, i) {
          chain = chain.then(function (acc) {
            if (onProgress) onProgress(i + 1, blocks.length, "Tłumaczenie fragmentu " + (i + 1) + " z " + blocks.length + "…");
            return delay(i ? 450 : 0).then(function () {
              return translateToPolish(block);
            }).then(function (tr) {
              return acc + (acc ? "\n\n" : "") + tr;
            });
          });
        });
        return chain;
      }

      function formatSourceLabel(url) {
        if (!url) return "";
        try {
          return new URL(url).hostname.replace(/^www\./, "");
        } catch (e) {
          return url.length > 48 ? url.slice(0, 47) + "…" : url;
        }
      }

      function setGeneratorProgress(show, pct, label) {
        var wrap = document.getElementById("gen-progress");
        var bar = document.getElementById("gen-progress-bar");
        var labelEl = document.getElementById("gen-progress-label");

        if (bar) bar.style.width = Math.min(100, Math.max(0, pct || 0)) + "%";
        if (labelEl) labelEl.textContent = label || "";
        if (status && show && label) {
          status.textContent = label;
          status.className = "gen-fetch-status";
        }

      function translateNewsList(news, onProgress) {
        var chain = Promise.resolve([]);
        var total = news.length;
        news.forEach(function (item, idx) {
          chain = chain.then(function (acc) {
            if (onProgress) {
              onProgress(idx, total, "Tłumaczenie newsu " + (idx + 1) + " z " + total + "…");
            }
            return translateToPolish(item.title).then(function (titlePl) {
              return delay(400).then(function () {
                return translateToPolish(item.desc);
              }).then(function (descPl) {
                acc.push({
                  title: titlePl,
                  desc: descPl,
                  url: item.url || "",
                  image: item.image || ""
                });
                if (onProgress) {
                  onProgress(idx + 1, total, "News " + (idx + 1) + " z " + total + " gotowy");
                }
                return acc;
              });
            });
          });
        });
        return chain;
      }

      function extractKeywordsFromNews(news) {
        var found = [];
        var rules = [
          { re: /aws|amazon/i, label: "AWS" },
          { re: /kubernetes|k8s/i, label: "Kubernetes" },
          { re: /\bai\b|llm|gpt|openai|claude/i, label: "AI" },
          { re: /security|cve|zero.?day/i, label: "bezpieczeństwo" },
          { re: /python|javascript|typescript|rust|golang|\bgo\b/i, label: "programowanie" },
          { re: /devops|terraform|docker/i, label: "DevOps" },
          { re: /cloud|azure|gcp/i, label: "chmura" }
        ];
        news.forEach(function (n) {
          var blob = (n.title + " " + n.desc);
          rules.forEach(function (rule) {
            if (rule.re.test(blob) && found.indexOf(rule.label) === -1) found.push(rule.label);
          });
        });
        return found.slice(0, 3);
      }

      function generateSmartTitle(news, weekLabel) {
        var kw = extractKeywordsFromNews(news);
        if (kw.length >= 2) {
          return kw.join(" · ") + " — news tygodnia · " + weekLabel;
        }
        if (kw.length === 1) {
          return kw[0] + " w centrum uwagi — news tygodnia IT · " + weekLabel;
        }
        return buildAutoPostTitle(weekLabel);
      }

      function generateSmartHook(news, weekLabel) {
        var kw = extractKeywordsFromNews(news);
        if (kw.indexOf("AWS") !== -1) {
          return "AWS i ekosystem chmurowy w tym tygodniu — " + weekLabel + ". Oto skrót tego, co warto wiedzieć.";
        }
        if (kw.indexOf("AI") !== -1) {
          return "AI i narzędzia developerskie nie zwalniają tempa — podsumowanie tygodnia " + weekLabel + ".";
        }
        if (kw.indexOf("bezpieczeństwo") !== -1) {
          return "Bezpieczeństwo i infrastruktura IT — najważniejsze newsy tygodnia " + weekLabel + ".";
        }
        return buildAutoHook(weekLabel);
      }

        return "media/posty/" + id + "-news-tygodnia-" + slug + ".jpg";

      function isValidImageUrl(url) {
        if (!url || typeof url !== "string") return false;
        if (url.indexOf("http") !== 0) return false;
        if (/reddit\.com.*default|self|thumb/i.test(url)) return false;
        if (url.length < 12) return false;
        return true;
      }

      function extractXmlTag(block, tag) {
        var re = new RegExp("<" + tag + "(?:\\s[^>]*)?>([\\s\\S]*?)<\\/" + tag + ">", "i");
        var m = block.match(re);
        if (!m) return "";
        return stripHtml(m[1].replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, "$1")).trim();
      }

      function extractXmlLink(block) {
        var href = block.match(/<link[^>]+href=["']([^"']+)["'][^>]*rel=["']alternate["']/i) ||
          block.match(/<link[^>]+rel=["']alternate["'][^>]+href=["']([^"']+)["']/i);
        if (href) return href[1];
        var plain = extractXmlTag(block, "link");
        if (plain && plain.indexOf("http") === 0) return plain;
        var guid = extractXmlTag(block, "guid");
        if (guid && guid.indexOf("http") === 0) return guid;
        return "";
      }

      function parseRssXml(xml, source, maxItems) {
        var blocks = xml.match(/<item[\s>][\s\S]*?<\/item>/gi) ||
          xml.match(/<entry[\s>][\s\S]*?<\/entry>/gi) || [];
        var items = [];
        for (var i = 0; i < blocks.length && items.length < maxItems; i++) {
          var b = blocks[i];
          var title = extractXmlTag(b, "title");
          if (!title || !TECH_KEYWORDS.test(title)) continue;
          var desc = extractXmlTag(b, "description") || extractXmlTag(b, "summary") || extractXmlTag(b, "content");
          var link = extractXmlLink(b);
          var pub = extractXmlTag(b, "pubDate") || extractXmlTag(b, "published") || extractXmlTag(b, "updated");
          var time = pub ? Math.floor(new Date(pub).getTime() / 1000) : 0;
          items.push({
            title: title,
            desc: ensureNewsDesc(title, desc, source, 0),
            url: link,
            image: "",
            source: source,
            score: 50,
            time: time || 0
          });
        }
        return items;
      }

      function fetchRssFeed(feedUrl, source, maxItems) {
        var proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(feedUrl);
        return fetch(proxy, { headers: { Accept: "application/xml, text/xml, */*" } })
          .then(function (res) {
            if (!res.ok) throw new Error("rss");
            return res.text();
          })
          .then(function (xml) {
            return parseRssXml(xml, source, maxItems || 6);
          })
          .catch(function () { return []; });
      }

      function fetchLobsters() {
        return fetchJson("https://lobste.rs/hottest.json", 12000).then(function (stories) {
          return (stories || []).map(function (s) {
            if (!s || !s.title) return null;
            if (!TECH_KEYWORDS.test(s.title)) return null;
            return {
              title: s.title.trim(),
              desc: ensureNewsDesc(s.title, "", "Lobste.rs", s.score || 0),
              url: s.url || s.short_id_url || "",
              image: "",
              source: "Lobste.rs",
              score: (s.score || 0) + (s.comment_count || 0) * 2,
              time: s.created_at ? Math.floor(new Date(s.created_at).getTime() / 1000) : 0
            };
          }).filter(Boolean);
        }).catch(function () { return []; });
      }

      function fetchHackerNewsStories(limit) {
        var scan = Math.min(80, Math.max(30, (limit || 5) * 8));
        return fetchJson("https://hacker-news.firebaseio.com/v0/topstories.json").then(function (ids) {
          ids = (ids || []).slice(0, scan);
          var chunks = [];
          for (var i = 0; i < ids.length; i += 10) {
            chunks.push(ids.slice(i, i + 10));
          }
          return chunks.reduce(function (chain, batch) {
            return chain.then(function (acc) {
              return Promise.all(batch.map(function (id) {
                return fetchJson("https://hacker-news.firebaseio.com/v0/item/" + id + ".json", 8000);
              })).then(function (items) {
                items.forEach(function (item) {
                  if (!item || !item.title) return;
                  var recent = isRecentUnix(item.time, 10);
                  var tech = TECH_KEYWORDS.test(item.title) || (item.text && TECH_KEYWORDS.test(item.text));
                  if (!recent && item.score < 120) return;
                  if (!tech && item.score < 200) return;
                  acc.push({
                    title: item.title.trim(),
                    desc: ensureNewsDesc(
                      item.title,
                      item.text || "",
                      "Hacker News",
                      item.score
                    ),
                    url: item.url || "https://news.ycombinator.com/item?id=" + item.id,
                    image: "",
                    source: "HN",
                    score: item.score || 0,
                    time: item.time || 0
                  });
                });
                return acc;
              });
            });
          }, Promise.resolve([]));
        });
      }

      function fetchDevToTag(tag, perPage) {
        var url = "https://dev.to/api/articles?tag=" + encodeURIComponent(tag) +
          "&top=7&per_page=" + (perPage || 4);
        return fetchJson(url).then(function (articles) {
          return (articles || []).map(function (a) {
            var img = a.cover_image || a.social_image || "";
            return {
              title: (a.title || "").trim(),
              desc: ensureNewsDesc(
                a.title,
                a.description || "",
                "dev.to / " + tag,
                a.positive_reactions_count || 0
              ),
              url: a.url || "",
              image: isValidImageUrl(img) ? img : "",
              source: "dev.to",
              score: (a.positive_reactions_count || 0) + (a.comments_count || 0) * 2,
              time: a.published_at ? Math.floor(new Date(a.published_at).getTime() / 1000) : 0
            };
          });
        }).catch(function () { return []; });

      function fetchRedditSubreddit(sub, limit) {
        var url = "https://www.reddit.com/r/" + sub + "/top.json?t=week&limit=" + (limit || 6) + "&raw_json=1";
        return fetchJson(url).then(function (data) {
          var posts = (data && data.data && data.data.children) || [];
          return posts.map(function (child) {
            var p = child.data;
            if (!p || !p.title) return null;
            if (!TECH_KEYWORDS.test(p.title)) return null;
            var thumb = p.preview && p.preview.images && p.preview.images[0];
            if (thumb && thumb.indexOf("width=") !== -1) {
              thumb = thumb.replace(/&amp;/g, "&");
            }
            return {
              title: p.title.trim(),
              desc: ensureNewsDesc(
                p.title,
                p.selftext || "",
                "Reddit r/" + sub,
                p.score
              ),
              url: p.url || "https://reddit.com" + p.permalink,
              image: isValidImageUrl(thumb) ? thumb : (isValidImageUrl(p.thumbnail) ? p.thumbnail : ""),
              source: "Reddit",
              score: p.score || 0,
              time: p.created_utc || 0
            };
          }).filter(Boolean);
        }).catch(function () { return []; });
      }

      function mergeWeeklyNews(arrays, limit, excludeMap) {
        var max = limit || 5;
        var seen = {};
        if (excludeMap) {
          Object.keys(excludeMap).forEach(function (k) { seen[k] = true; });
        }
        var merged = [];
        arrays.forEach(function (list) {
          (list || []).forEach(function (item) {
            if (!item.title) return;
            if (isNewsExcluded(item, excludeMap)) return;
            var key = newsDedupeKey(item.title);
            if (seen[key]) return;
            var uk = newsUrlKey(item.url);
            if (uk && seen["url:" + uk]) return;
            seen[key] = true;
            if (uk) seen["url:" + uk] = true;
            merged.push(item);
          });
        });
        merged.sort(function (a, b) {
          return (b.score || 0) - (a.score || 0) || (b.time || 0) - (a.time || 0);
        });
        return merged.slice(0, max).map(function (item) {
          return {
            title: item.title,
            desc: item.desc,
            url: item.url || "",
            image: item.image || ""
          };
        });
      }

      function fetchWeeklyNewsFromInternet(limit, excludeMap) {
        var count = limit || 5;
        var hasExclude = excludeMap && Object.keys(excludeMap).length > 0;
        var perSource = Math.max(4, Math.ceil(count / 2));
        if (hasExclude) perSource = Math.max(perSource * 2, count * 3);
        var hnScan = hasExclude ? Math.min(120, count * 10) : count;
        return Promise.all([
          fetchHackerNewsStories(hnScan),
          fetchLobsters(),
          fetchDevToTag("aws", perSource),
          fetchDevToTag("devops", perSource),
          fetchDevToTag("programming", perSource),
          fetchDevToTag("cloud", perSource),
          fetchDevToTag("security", perSource),
          fetchDevToTag("ai", perSource),
          fetchRedditSubreddit("aws", perSource),
          fetchRedditSubreddit("programming", perSource),
          fetchRedditSubreddit("devops", perSource),
          fetchRedditSubreddit("kubernetes", perSource),
          fetchRedditSubreddit("sysadmin", perSource),
          fetchRedditSubreddit("technology", perSource),
          fetchRssFeed("https://feeds.arstechnica.com/arstechnica/technology-lab", "Ars Technica", perSource),
          fetchRssFeed("https://www.theregister.com/headlines.atom", "The Register", perSource),
          fetchRssFeed("https://www.infoworld.com/index.rss", "InfoWorld", perSource),
          fetchRssFeed("https://techcrunch.com/feed/", "TechCrunch", perSource),
          fetchRssFeed("https://www.zdnet.com/news/rss.xml", "ZDNet", perSource)
        ]).then(function (results) {
          var news = mergeWeeklyNews(results, count, excludeMap);
          if (news.length < Math.min(3, count)) {
            return fetchHackerNewsStories(Math.max(count * 4, 40)).then(function (hn) {
              return mergeWeeklyNews([news, hn], count, excludeMap);
            });
          }
          return news;
        });
      }

                  '<div id="gen-format-hint">' +
                  (window.ImageFormats
                    ? ImageFormats.renderGeneratorHintHTML(["li", "ig"])
                    : '<p class="gen-image-hint">Wgraj własną grafikę do <code>Panel/media/posty/</code> i podaj ścieżkę.</p>') +
                  '</div>' +

                  '<button type="button" class="gen-btn gen-btn-primary" id="gen-save-panel">Zapisz szkic w panelu</button>' +

                  '<button type="button" class="gen-btn" id="gen-copy-snippet">Kopiuj do content-data.js</button>' +
                '</div>' +

                  '<span class="gen-label">Fragment content-data.js</span>' +
