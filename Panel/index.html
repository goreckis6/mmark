        );
      }

      function bindGeneratorEvents() {
        var draft = loadGeneratorDraft();
        ensureDraftLangFields(draft);

        function snapshotCurrentLang() {
          var lang = draft.lang || "en";
          var snap = {
            news: collectNewsFromDOM(),
            hook: document.getElementById("gen-hook").value,
            postTitle: (document.getElementById("gen-post-title") || {}).value || "",
            li: draft.li || "",
            ig: draft.ig || ""
          };
          if (lang === "pl") {
            draft.newsPl = cloneNewsList(snap.news);
            draft.hookPl = snap.hook;
            draft.postTitlePl = snap.postTitle;
            draft.liPl = snap.li;
            draft.igPl = snap.ig;
          } else {
            draft.newsEn = cloneNewsList(snap.news);
            draft.hookEn = snap.hook;
            draft.postTitleEn = snap.postTitle;
            draft.liEn = snap.li;
            draft.igEn = snap.ig;
          }
        }

        function updateLangTabs() {
          var hasEn = !!(draft.newsEn && draft.newsEn.length) || !!(draft.liEn || draft.igEn) || !!(draft.hookEn);
          var hasPl = !!(draft.newsPl && draft.newsPl.length) || !!(draft.liPl || draft.igPl) || !!(draft.hookPl);
          document.querySelectorAll(".gen-lang-tab").forEach(function (tab) {
            var code = tab.getAttribute("data-gen-lang");
            tab.classList.toggle("active", code === (draft.lang || "en"));
            tab.disabled = code === "pl" && !hasPl;
          });
          var showEnBtn = document.getElementById("gen-show-en");
          if (showEnBtn) showEnBtn.disabled = !hasEn || (draft.lang || "en") === "en";
        }

        function applyGeneratorLang(lang, opts) {
          opts = opts || {};
          if (lang === "pl") {
            if (!draft.newsPl.length && !draft.liPl && !draft.igPl && !draft.hookPl) {
              showToast("Najpierw kliknij „Tłumacz na PL”");
              return false;
            }
          } else if (!(draft.newsEn && draft.newsEn.length) && !(draft.liEn || draft.igEn) && !(draft.hookEn)) {
            if ((draft.lang || "en") === "en") {
              snapshotCurrentLang();
            } else {
              showToast("Brak wersji angielskiej");
              return false;
            }
          }

          if (!opts.skipSnapshot && (draft.lang || "en") !== lang) {
            snapshotCurrentLang();
          }
          draft.lang = lang;
          var news = lang === "pl" ? cloneNewsList(draft.newsPl) : cloneNewsList(draft.newsEn);
          var hook = lang === "pl" ? (draft.hookPl || "") : (draft.hookEn || "");
          var postTitle = lang === "pl" ? (draft.postTitlePl || "") : (draft.postTitleEn || "");
          draft.li = lang === "pl" ? (draft.liPl || "") : (draft.liEn || "");
          draft.ig = lang === "pl" ? (draft.igPl || "") : (draft.igEn || "");
          draft.news = news;
          draft.hook = hook;
          draft.postTitle = postTitle;

          refillNewsList(news);
          document.getElementById("gen-hook").value = hook;
          var postTitleEl = document.getElementById("gen-post-title");
          if (postTitleEl) postTitleEl.value = postTitle;
          saveGeneratorDraft(draft);
          updateGeneratorPreview();
          updateLangTabs();
          return true;
        }

        function persistDraft(extra) {
          snapshotCurrentLang();
          var postTitleEl = document.getElementById("gen-post-title");
          var postImageEl = document.getElementById("gen-post-image");
          var newsCountEl = document.getElementById("gen-news-count");
          var d = Object.assign({
            lang: draft.lang || "en",
            hook: document.getElementById("gen-hook").value,
            postTitle: postTitleEl ? postTitleEl.value : "",
            postImage: postImageEl ? postImageEl.value : "",
            newsCount: newsCountEl ? parseInt(newsCountEl.value, 10) || 5 : (draft.newsCount || 5),
            dateFrom: document.getElementById("gen-date-from").value,
            dateTo: document.getElementById("gen-date-to").value,
            dateLi: document.getElementById("gen-date-li").value,
            dateIg: document.getElementById("gen-date-ig").value,
            topics: collectTopicsFromDOM(),
            news: collectNewsFromDOM(),
            li: draft.li,
            ig: draft.ig,
            newsEn: draft.newsEn || [],
            newsPl: draft.newsPl || [],
            hookEn: draft.hookEn || "",
            hookPl: draft.hookPl || "",
            postTitleEn: draft.postTitleEn || "",
            postTitlePl: draft.postTitlePl || "",
            liEn: draft.liEn || "",
            igEn: draft.igEn || "",
            liPl: draft.liPl || "",
            igPl: draft.igPl || ""
          }, extra || {});
          draft = ensureDraftLangFields(d);
          saveGeneratorDraft(draft);
        }

        function getNewsCount() {
          var el = document.getElementById("gen-news-count");
          return el ? parseInt(el.value, 10) || 5 : (draft.newsCount || 5);
        }

        function applyNewsToForm(news, thenBuild, status) {
          var wl = formatWeekLabel(
            document.getElementById("gen-date-from").value,
            document.getElementById("gen-date-to").value
          );
          var smartTitleEn = buildAutoPostTitleEn(wl);
          var smartHookEn = buildAutoHookEn(wl);
          var imgPath = suggestPostImagePath(document.getElementById("gen-date-to").value);

          document.getElementById("gen-hook").value = smartHookEn;
          var postTitleEl = document.getElementById("gen-post-title");
          if (postTitleEl) postTitleEl.value = smartTitleEn;
          var postImageEl = document.getElementById("gen-post-image");
          if (postImageEl && !postImageEl.value.trim()) postImageEl.value = imgPath;

          refillNewsList(news);
          draft.lang = "en";
          draft.news = news;
          draft.newsEn = cloneNewsList(news);
          draft.hook = smartHookEn;
          draft.hookEn = smartHookEn;
          draft.postTitle = smartTitleEn;
          draft.postTitleEn = smartTitleEn;
          draft.postImage = postImageEl ? postImageEl.value : imgPath;
          draft.li = "";
          draft.ig = "";
          draft.liEn = "";
          draft.igEn = "";
          persistDraft({
            lang: "en",
            news: news,
            newsEn: cloneNewsList(news),
            hook: smartHookEn,
            hookEn: smartHookEn,
            postTitle: smartTitleEn,
            postTitleEn: smartTitleEn,
            postImage: draft.postImage,
            li: "",
            ig: "",
            liEn: "",
            igEn: ""
          });
          updateLangTabs();

          if (status) {
            status.textContent = "Gotowe: " + news.length + " newsów · opisy wygenerowane.";
            status.className = "gen-fetch-status ok";
          }
          showToast("Newsy wczytane");

          if (thenBuild) document.getElementById("gen-build").click();
        }

        function refillNewsList(newsItems) {
          var list = document.getElementById("gen-news-list");
          if (!list) return;
          list.innerHTML = renderNewsListHTML(newsItems);
          list.querySelectorAll(".gen-news-remove").forEach(bindNewsRemove);
        }

        function setFetchLoading(loading) {
          ["gen-fetch-news", "gen-fetch-and-build"].forEach(function (id) {
            var btn = document.getElementById(id);
            if (!btn) return;
            btn.classList.toggle("is-loading", loading);
            var spin = btn.querySelector(".gen-spin");
            if (spin) spin.style.display = loading ? "block" : "none";
          });
        }

        function runFetchFromInternet(thenBuild) {
          var status = document.getElementById("gen-fetch-status");
          if (!navigator.onLine) {
            if (status) {
              status.textContent = "Brak połączenia z internetem. Połącz się z siecią i spróbuj ponownie.";
              status.className = "gen-fetch-status err";
            }
            return;
          }

          setFetchLoading(true);
          var count = getNewsCount();
          var existingNews = collectNewsFromDOM().filter(function (n) { return (n.title || "").trim(); });
          var excludeMap = existingNews.length ? buildNewsExcludeMap(existingNews) : null;
          var isReload = !!existingNews.length;

          if (status) {
            status.textContent = isReload
              ? "Szukam " + count + " nowych newsów (pomijam " + existingNews.length + " już wczytanych)…"
              : "Wczytuję " + count + " newsów (HN, dev.to, Reddit, Lobste.rs, Ars Technica…)…";
            status.className = "gen-fetch-status";
          }
          setGeneratorProgress(true, isReload ? 8 : 5, status ? status.textContent : "");

          var w = getCurrentWeekRange();
          if (!document.getElementById("gen-date-from").value) {
            document.getElementById("gen-date-from").value = toISODate(w.from);
            document.getElementById("gen-date-to").value = toISODate(w.to);
          }

          fetchWeeklyNewsFromInternet(count, excludeMap).then(function (news) {
            if (!news.length) {
              throw new Error(isReload
                ? "Brak nowych newsów — spróbuj za chwilę lub wyczyść listę"
                : "Nie znaleziono newsów — spróbuj ponownie za chwilę");
            }
            setGeneratorProgress(true, 35, "Generuję opisy newsów…");
            return enrichNewsDescriptionsViaBedrock(news, isReload ? existingNews : [], function (pct, label) {
              setGeneratorProgress(true, pct, label);
            });
          }).then(function (news) {
            applyNewsToForm(news, thenBuild, status);
            if (status && isReload) {
              status.textContent = "Gotowe: " + news.length + " nowych newsów (bez duplikatów) · opisy wygenerowane.";
            }
          }).catch(function (err) {
            var msg = err && err.message ? err.message : "nieznany błąd";
            if (status) {
              status.textContent = "Nie udało się wczytać newsów (" + msg + "). Otwórz panel przez http://localhost lub użyj promptu Cursora.";
              status.className = "gen-fetch-status err";
            }
            showToast("Błąd wczytywania newsów");
          }).finally(function () {
            setFetchLoading(false);
            setGeneratorProgress(false);
          });
        }

        document.querySelectorAll(".gen-tag").forEach(function (btn) {
          btn.addEventListener("click", function () {
            btn.classList.toggle("active");
            persistDraft();
          });
        });

        document.getElementById("gen-add-news").addEventListener("click", function () {
          var list = document.getElementById("gen-news-list");
          var count = list.querySelectorAll(".gen-news-item").length;
          var maxNews = Math.max(12, getNewsCount());
          if (count >= maxNews) {
            showToast("Maksymalnie " + maxNews + " newsów");
            return;
          }
          var div = document.createElement("div");
          div.className = "gen-news-item";
          div.innerHTML =
            '<div class="gen-news-body">' +
            '<button type="button" class="gen-news-remove" aria-label="Usuń news">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>' +
            '</button>' +
            '<div class="gen-field"><label class="gen-label">Tytuł newsu ' + (count + 1) + '</label>' +
            '<input type="text" class="gen-input gen-news-title" placeholder="Tytuł newsu"></div>' +
            '<div class="gen-field"><label class="gen-label">Opis</label>' +
            '<textarea class="gen-textarea gen-news-desc" rows="2" placeholder="Opis"></textarea></div></div>';
          list.appendChild(div);
          bindNewsRemove(div.querySelector(".gen-news-remove"));
        });

        function bindNewsRemove(btn) {
          btn.addEventListener("click", function () {
            var list = document.getElementById("gen-news-list");
            if (list.querySelectorAll(".gen-news-item").length <= 1) {
              showToast("Minimum 1 news");
              return;
            }
            btn.closest(".gen-news-item").remove();
            persistDraft();
          });
        }

        document.querySelectorAll(".gen-news-remove").forEach(bindNewsRemove);

        ["gen-hook", "gen-post-title", "gen-post-image", "gen-date-from", "gen-date-to", "gen-date-li", "gen-date-ig"].forEach(function (id) {
          var el = document.getElementById(id);
          if (el) el.addEventListener("change", function () { persistDraft(); });
          if (el && el.tagName === "INPUT") el.addEventListener("input", function () { persistDraft(); });
        });

        document.getElementById("gen-week-now").addEventListener("click", function () {
          var w = getCurrentWeekRange();
          document.getElementById("gen-date-from").value = toISODate(w.from);
          document.getElementById("gen-date-to").value = toISODate(w.to);
          document.getElementById("gen-date-li").value = toISODate(w.to);
          var igDate = new Date(w.to);
          igDate.setDate(igDate.getDate() + 3);
          document.getElementById("gen-date-ig").value = toISODate(igDate);
          var wl = formatWeekLabel(toISODate(w.from), toISODate(w.to));
          document.getElementById("gen-hook").value = buildAutoHook(wl);
          var pt = document.getElementById("gen-post-title");
          if (pt) pt.value = buildAutoPostTitle(wl);
          persistDraft();
          showToast("Ustawiono bieżący tydzień");
        });

        document.getElementById("gen-clear-all").addEventListener("click", function () {
          if (!confirm("Wyczyścić cały szkic generatora? Newsy, post, tytuły i daty wrócą do zera.")) return;
          clearGeneratorDraft();
          state.genPreviewTab = "li";
          showToast("Generator wyczyszczony");
          render();
        });

        document.getElementById("gen-fetch-news").addEventListener("click", function () {
          runFetchFromInternet(false);
        });

        document.getElementById("gen-fetch-and-build").addEventListener("click", function () {
          runFetchFromInternet(true);
        });

        document.getElementById("gen-gen-title").addEventListener("click", function () {
          var news = collectNewsFromDOM().filter(function (n) { return n.title; });
          if (!news.length) {
            showToast("Brak newsów — najpierw wczytaj lub wpisz treści");
            return;
          }
          var wl = formatWeekLabel(
            document.getElementById("gen-date-from").value,
            document.getElementById("gen-date-to").value
          );
          var lang = draft.lang || "en";
          if (lang === "pl") {
            document.getElementById("gen-post-title").value = generateSmartTitle(news, wl);
            document.getElementById("gen-hook").value = generateSmartHook(news, wl);
          } else {
            document.getElementById("gen-post-title").value = buildAutoPostTitleEn(wl);
            document.getElementById("gen-hook").value = buildAutoHookEn(wl);
          }
          persistDraft();
          showToast("Tytuł i hook wygenerowane");
        });

        document.getElementById("gen-translate-pl").addEventListener("click", function () {
          var news = collectNewsFromDOM().filter(function (n) { return n.title; });
          var hasPosts = !!(draft.li || draft.ig);
          if (!news.length && !hasPosts && !(draft.newsEn && draft.newsEn.length)) {
            showToast("Brak treści do tłumaczenia");
            return;
          }
          snapshotCurrentLang();
          if (draft.lang === "en" && news.length) {
            draft.newsEn = cloneNewsList(news);
          }
          var sourceNews = (draft.newsEn && draft.newsEn.length) ? draft.newsEn : news;
          var translateBtn = document.getElementById("gen-translate-pl");
          if (translateBtn) translateBtn.classList.add("is-loading");
          setGeneratorProgress(true, 2, "Start tłumaczenia na polski…");

          var newsPromise = sourceNews.length
            ? translateNewsList(sourceNews, function (done, total, label) {
                var pct = total ? Math.round((done / total) * 72) : 5;
                setGeneratorProgress(true, pct, label);
              })
            : Promise.resolve([]);

          newsPromise.then(function (translated) {
            setGeneratorProgress(true, 76, "Tłumaczenie hooka…");
            var hookSource = draft.hookEn || (document.getElementById("gen-hook") || {}).value || "";
            var titleSource = draft.postTitleEn || (document.getElementById("gen-post-title") || {}).value || "";
            return translateToPolish(hookSource).then(function (hookPl) {
              setGeneratorProgress(true, 82, "Tłumaczenie tytułu wpisu…");
              return delay(400).then(function () {
                return translateToPolish(titleSource);
              }).then(function (titlePl) {
                var wl = formatWeekLabel(
                  document.getElementById("gen-date-from").value,
                  document.getElementById("gen-date-to").value
                );
                draft.newsPl = translated.length ? cloneNewsList(translated) : draft.newsPl;
                draft.hookPl = hookPl || draft.hookPl || "";
                draft.postTitlePl = titlePl || draft.postTitlePl || "";

                var posts = { li: draft.liPl || "", ig: draft.igPl || "" };
                if (translated.length) {
                  setGeneratorProgress(true, 90, "Generowanie postów LinkedIn i Instagram…");
                  posts = buildPostsForLang("pl", draft.hookPl, translated, wl);
                } else if (draft.liEn || draft.igEn) {
                  setGeneratorProgress(true, 86, "Tłumaczenie posta LinkedIn…");
                  return translateLongText(draft.liEn || "", function (done, total, label) {
                    setGeneratorProgress(true, 86 + Math.round((done / total) * 8), label);
                  }).then(function (liPl) {
                    setGeneratorProgress(true, 95, "Tłumaczenie posta Instagram…");
                    return delay(450).then(function () {
                      return translateLongText(draft.igEn || "", function (done, total, label) {
                        setGeneratorProgress(true, 95 + Math.round((done / total) * 4), label);
                      });
                    }).then(function (igPl) {
                      posts.li = liPl || draft.liPl || "";
                      posts.ig = igPl || draft.igPl || "";
                      return { translated: translated, posts: posts };
                    });
                  });
                }
                return { translated: translated, posts: posts };
              });
            });
          }).then(function (result) {
            setGeneratorProgress(true, 100, "Gotowe — przełączam na wersję PL…");
            draft.liPl = result.posts.li || "";
            draft.igPl = result.posts.ig || "";
            draft.lang = "pl";
            draft.news = draft.newsPl;
            draft.hook = draft.hookPl;
            draft.postTitle = draft.postTitlePl;
            draft.li = draft.liPl;
            draft.ig = draft.igPl;
            saveGeneratorDraft(draft);
            applyGeneratorLang("pl", { skipSnapshot: true });
            var status = document.getElementById("gen-fetch-status");
            if (status) {
              var parts = [];
              if (draft.newsPl.length) parts.push(draft.newsPl.length + " newsów");
              if (draft.liPl || draft.igPl) parts.push("post LI/IG");
              status.textContent = "Przetłumaczono: " + parts.join(", ") + ".";
              status.className = "gen-fetch-status ok";
            }
            showToast("Wersja PL gotowa — EN zostaje pod „Show in EN”");
          }).catch(function () {
            var status = document.getElementById("gen-fetch-status");
            if (status) {
              status.textContent = "Błąd tłumaczenia — spróbuj ponownie za chwilę.";
              status.className = "gen-fetch-status err";
            }
            showToast("Błąd tłumaczenia");
          }).finally(function () {
            if (translateBtn) translateBtn.classList.remove("is-loading");
            setTimeout(function () { setGeneratorProgress(false, 0, ""); }, 1200);
          });
        });

        document.getElementById("gen-show-en").addEventListener("click", function () {
          if (applyGeneratorLang("en")) {
            showToast("Wersja angielska");
          }
        });

        document.querySelectorAll(".gen-lang-tab").forEach(function (tab) {
          tab.addEventListener("click", function () {
            if (tab.disabled) return;
            var lang = tab.getAttribute("data-gen-lang");
            if (applyGeneratorLang(lang)) {
              showToast(lang === "en" ? "Wersja angielska" : "Wersja polska");
            }
          });
        });

        var newsCountSelect = document.getElementById("gen-news-count");
        if (newsCountSelect) {
          newsCountSelect.addEventListener("change", function () {
            persistDraft({ newsCount: getNewsCount() });
          });
        }

        document.getElementById("gen-build").addEventListener("click", function () {
          var news = collectNewsFromDOM().filter(function (n) { return n.title; });
          if (!news.length) {
            showToast("Dodaj co najmniej 1 news z tytułem");
            return;
          }
          var lang = draft.lang || "en";
          var hook = document.getElementById("gen-hook").value.trim() ||
            (lang === "pl"
              ? "Co wydarzyło się w IT, AWS i świecie programowania w tym tygodniu?"
              : "What happened in IT, AWS and software development this week?");
          var wl = formatWeekLabel(
            document.getElementById("gen-date-from").value,
            document.getElementById("gen-date-to").value
          );
          var posts = buildPostsForLang(lang, hook, news, wl);
          draft.li = posts.li;
          draft.ig = posts.ig;
          if (lang === "pl") {
            draft.liPl = posts.li;
            draft.igPl = posts.ig;
          } else {
            draft.liEn = posts.li;
            draft.igEn = posts.ig;
          }
          persistDraft({ li: draft.li, ig: draft.ig, liEn: draft.liEn, igEn: draft.igEn, liPl: draft.liPl, igPl: draft.igPl });
          updateGeneratorPreview();
          updateLangTabs();
          showToast("Post wygenerowany — możesz skopiować treść");
        });

        function updateGeneratorPreview() {
          var box = document.getElementById("gen-preview");
          var copyActions = document.getElementById("gen-copy-actions");
          var text = state.genPreviewTab === "li" ? draft.li : draft.ig;
          var hasPosts = !!(draft.li || draft.ig);
          if (!text) {
            box.className = "gen-preview-box empty";
            box.textContent = "Kliknij „Wygeneruj post”, aby zobaczyć treść.";
          } else {
            box.className = "gen-preview-box";
            box.textContent = text;
          }
          if (copyActions) copyActions.hidden = !hasPosts;
          document.querySelectorAll(".gen-preview-tab").forEach(function (tab) {
            tab.classList.toggle("active", tab.dataset.tab === state.genPreviewTab);
          });
        }

        document.querySelectorAll(".gen-preview-tab").forEach(function (tab) {
          tab.addEventListener("click", function () {
            state.genPreviewTab = tab.dataset.tab;
            updateGeneratorPreview();
          });
        });

        document.getElementById("gen-copy-li").addEventListener("click", function () {
          if (!draft.li) { showToast("Najpierw wygeneruj post"); return; }
          copyText(draft.li);
        });

        document.getElementById("gen-copy-ig").addEventListener("click", function () {
          if (!draft.ig) { showToast("Najpierw wygeneruj post"); return; }
          copyText(draft.ig);
        });

        document.getElementById("gen-copy-active").addEventListener("click", function () {
          var text = state.genPreviewTab === "li" ? draft.li : draft.ig;
          if (!text) { showToast("Najpierw wygeneruj post"); return; }
          copyText(text);
        });

        document.getElementById("gen-copy-snippet").addEventListener("click", function () {
          if (!draft.li && !draft.ig) {
            showToast("Najpierw wygeneruj post");
            return;
          }
          var wl = formatWeekLabel(
            document.getElementById("gen-date-from").value,
            document.getElementById("gen-date-to").value
          );
          var titleBase = (document.getElementById("gen-post-title") && document.getElementById("gen-post-title").value.trim()) ||
            buildAutoPostTitle(wl);
          var imagePath = (document.getElementById("gen-post-image") && document.getElementById("gen-post-image").value.trim()) || "";
          var snippet = buildContentDataSnippet(
            titleBase,
            document.getElementById("gen-date-li").value,
            document.getElementById("gen-date-ig").value,
            document.getElementById("gen-platform-li").checked ? draft.li : "",
            document.getElementById("gen-platform-ig").checked ? draft.ig : "",
            suggestNextId(),
            imagePath
          );
          document.getElementById("gen-snippet").textContent = snippet;
          document.getElementById("gen-snippet-wrap").style.display = "block";
          copyText(snippet);
        });

        document.getElementById("gen-save-md").addEventListener("click", function () {
          var news = collectNewsFromDOM().filter(function (n) { return (n.title || "").trim(); });
          if (!news.length && !draft.li && !draft.ig) {
            showToast("Brak treści do zapisu — wczytaj newsy lub wygeneruj post");
            return;
          }
          var wl = formatWeekLabel(
            document.getElementById("gen-date-from").value,
            document.getElementById("gen-date-to").value
          );
          var titleBase = (document.getElementById("gen-post-title") && document.getElementById("gen-post-title").value.trim()) ||
            buildAutoPostTitle(wl);
          var imagePath = (document.getElementById("gen-post-image") && document.getElementById("gen-post-image").value.trim()) || "";
          var md = buildGeneratorMarkdown({
            title: titleBase,
            weekLabel: wl,
            lang: draft.lang || "en",
            dateLi: document.getElementById("gen-date-li").value,
            dateIg: document.getElementById("gen-date-ig").value,
            image: imagePath,
            topics: collectTopicsFromDOM(),
            hook: document.getElementById("gen-hook").value,
            news: news,
            li: document.getElementById("gen-platform-li").checked ? draft.li : "",
            ig: document.getElementById("gen-platform-ig").checked ? draft.ig : ""
          });
          var datePart = (document.getElementById("gen-date-to").value || toISODate(new Date())).replace(/-/g, "");
          var filename = slugifyFilename(titleBase) + "-" + datePart + ".md";
          saveMarkdownFile(filename, md);
        });

        document.getElementById("gen-save-panel").addEventListener("click", function () {
          if (!window.PostManager) return;
          if (!draft.li && !draft.ig) {
            showToast("Najpierw wygeneruj post");
            return;
          }
          var wl = formatWeekLabel(
            document.getElementById("gen-date-from").value,
            document.getElementById("gen-date-to").value
          );
          var titleBase = (document.getElementById("gen-post-title") && document.getElementById("gen-post-title").value.trim()) ||
            buildAutoPostTitle(wl);
          var imagePath = (document.getElementById("gen-post-image") && document.getElementById("gen-post-image").value.trim()) || "";
          var platforms = [];
          if (document.getElementById("gen-platform-li").checked) platforms.push("li");
          if (document.getElementById("gen-platform-ig").checked) platforms.push("ig");
          if (!platforms.length) platforms = ["li", "ig"];
          var textMaster = draft.li || draft.ig;
          var textFb = PostManager.formatForFacebook(textMaster);
          var postDate = (document.getElementById("gen-date-li") && document.getElementById("gen-date-li").value) ||
            (document.getElementById("gen-date-ig") && document.getElementById("gen-date-ig").value) ||
            new Date().toISOString().slice(0, 10);
          PostManager.savePost({
            id: "gen-" + Date.now(),
            type: "post",
            title: titleBase,
            topic: "News tygodnia",
            date: postDate,
            platforms: platforms,
            image: imagePath,
            textMaster: textMaster,
            textLi: draft.li || "",
            textFb: textFb,
            textIg: draft.ig || "",
            status: "draft",
            donePlatforms: []
          });
          state.mode = "browse";
          showToast("Szkic zapisany w panelu");
          render();
        });

        function updateGenFormatHint() {
          var wrap = document.getElementById("gen-format-hint");
          if (!wrap || !window.ImageFormats) return;
          var plats = [];
          var liEl = document.getElementById("gen-platform-li");
          var igEl = document.getElementById("gen-platform-ig");
          if (liEl && liEl.checked) plats.push("li");
          if (igEl && igEl.checked) plats.push("ig");
          wrap.innerHTML = ImageFormats.renderGeneratorHintHTML(plats.length ? plats : ["li", "ig"]);
        }

        ["gen-platform-li", "gen-platform-ig"].forEach(function (id) {
          var el = document.getElementById(id);
          if (el) el.addEventListener("change", updateGenFormatHint);
        });
        updateGenFormatHint();
        updateGeneratorPreview();
        updateLangTabs();
      }

      function openDetail(id) {
        var item = getAllItems().find(function (i) { return i.id === id; });
        if (!item || isDeleted(id)) return;

        state.selectedId = id;

        var platforms = (item.platforms || []).map(function (p) {
          return '<span class="detail-platform">' + (PLATFORM_LABELS[p] || p) + '</span>';
        }).join("");

        var imageBlock = item.image
          ? '<img src="' + escapeAttr(item.image) + '" alt="">'
          : '<div class="detail-image-empty">' + iconImage() + '<span>brak grafiki · wgraj własną</span></div>';

        var pathText = item.image || "— brak pliku —";

        var statusRow = window.PostManager
          ? '<div class="detail-status-row">' + PostManager.renderStatusBadge(item, true) +
            PostManager.renderPlatformPublishStatus(item, PLATFORM_LABELS) + "</div>"
          : "";

        document.getElementById("detail-content").innerHTML =
          '<div class="detail-image">' + imageBlock + '</div>' +
          '<div class="detail-body">' +
            statusRow +
            '<h2 class="detail-title">' + escapeHtml(item.title) + '</h2>' +
            '<button type="button" class="detail-edit-btn" id="detail-edit-btn">' +
              '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>' +
              '<path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
              'Edytuj post</button>' +
            '<div class="detail-meta-row">' +
              '<div class="detail-meta-item">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' +
                formatDate(item.date) +
              '</div>' +
            '</div>' +
            '<div class="detail-platforms">' + platforms + '</div>' +
            (window.ImageFormats ? ImageFormats.renderDetailFormatsHTML(item.platforms) : "") +
            '<div class="detail-path">' + escapeHtml(pathText) + '</div>' +
            (window.PostManager ? PostManager.renderDetailTextsHTML(item, PLATFORM_LABELS) : "") +
            '<div class="detail-copy-row">' +
              '<button type="button" class="detail-copy-btn" id="detail-copy-title">Kopiuj tytuł</button>' +
              '<button type="button" class="detail-copy-btn" id="detail-save-md">Zapisz .md</button>' +
            '</div>' +
            (window.PostManager ? PostManager.renderReadyChecklistHTML(item) : "") +
            (window.PostManager ? PostManager.renderDoneTogglesHTML(item, PLATFORM_LABELS) : "") +
            '<button class="detail-delete" id="detail-delete-btn">' + iconTrash() + ' Usuń treść</button>' +
          '</div>';

        document.getElementById("detail-delete-btn").addEventListener("click", function () {
          if (confirm('Usunąć treść „' + item.title + '" z panelu?')) {
            deleteItem(id);
          }
        });

        var editBtn = document.getElementById("detail-edit-btn");
        if (editBtn) {
          editBtn.addEventListener("click", function () {
            closeDetail();
            openEditor(id);
          });
        }

        var copyTitleBtn = document.getElementById("detail-copy-title");
        if (copyTitleBtn) copyTitleBtn.addEventListener("click", function () { copyText(item.title || ""); });

        var saveMdBtn = document.getElementById("detail-save-md");
        if (saveMdBtn) {
          saveMdBtn.addEventListener("click", function () {
            var md = buildPostMarkdown(item);
            var datePart = (item.date || toISODate(new Date())).replace(/-/g, "");
            var filename = slugifyFilename(item.title || "post") + "-" + datePart + ".md";
            saveMarkdownFile(filename, md);
          });
        }

        if (window.PostManager) {
          PostManager.bindDetailTextTabs(function (plat) {
            copyText(PostManager.getTextForPlatform(item, plat));
          });
          PostManager.bindDoneToggles(item, function () { openDetail(id); });
        }

        document.getElementById("detail-overlay").classList.add("open");
        document.getElementById("detail-panel").classList.add("open");
      }

      function closeDetail() {
        state.selectedId = null;
        document.getElementById("detail-overlay").classList.remove("open");
        document.getElementById("detail-panel").classList.remove("open");
      }

      function openEditor(id) {
        state.mode = "editor";
        state.editId = id || null;
        closeDetail();
        render();
      }

      function render() {
        var isBrowse = state.mode === "browse";
        var showBrowseChrome = isBrowse;

        document.getElementById("main-toolbar").classList.toggle("main-toolbar-hidden", !showBrowseChrome);
        document.getElementById("search-wrap").classList.toggle("topbar-search-hidden", !showBrowseChrome);
        document.getElementById("sidebar-filters").classList.toggle("sidebar-section-hidden", !showBrowseChrome);

        renderNav();
        if (isBrowse) {
          renderTopicFilters();
          renderPlatformFilters();
          renderQueueFilters();
        }
        renderHeader();
        renderContent();
      }

      function openGenerator() {
        state.mode = "generator";
        closeDetail();
        render();
      }

      function openBrand() {
        state.mode = "brand";
        closeDetail();
        render();
      }

      function openFormats() {
        state.mode = "formats";
        closeDetail();
        render();
      }

      var btnNewPost = document.getElementById("btn-new-post");
      if (btnNewPost) {
        btnNewPost.addEventListener("click", function () { openEditor(null); });
      }

      var navGen = document.getElementById("nav-generator");
      if (navGen) {
        navGen.addEventListener("click", openGenerator);
        navGen.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            openGenerator();
          }
        });
      }

      var navBrand = document.getElementById("nav-brand");
      if (navBrand) {
        navBrand.addEventListener("click", openBrand);
        navBrand.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            openBrand();
          }
        });
      }

      var navFmt = document.getElementById("nav-formats");
      if (navFmt) {
        navFmt.addEventListener("click", openFormats);
        navFmt.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            openFormats();
          }
        });
      }

      document.getElementById("search").addEventListener("input", function (e) {
        if (state.mode !== "browse") return;
        state.search = e.target.value;
        renderContent();
        renderHeader();
      });

      document.getElementById("btn-grid").addEventListener("click", function () {
        if (state.mode !== "browse") return;
        state.mode = "browse";
        state.view = "grid";
        renderHeader();
        renderContent();
      });

      document.getElementById("btn-calendar").addEventListener("click", function () {
        if (state.mode !== "browse") return;
        state.mode = "browse";
        state.view = "calendar";
        renderHeader();
        renderContent();
      });

      document.getElementById("btn-restore").addEventListener("click", function () {
        var count = getDeletedIds().length;
        if (count > 0 && confirm("Przywrócić wszystkie usunięte treści (" + count + ")?")) {
          restoreAll();
        }
      });

      document.getElementById("detail-close").addEventListener("click", closeDetail);
      document.getElementById("detail-overlay").addEventListener("click", closeDetail);

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeDetail();
      });

      function updateAuthUI() {
        var userEl = document.getElementById("sidebar-user");
        var logoutBtn = document.getElementById("btn-logout");
        if (!window.AuthClient || !AuthClient.isServerMode()) {
          if (userEl) userEl.hidden = true;
          if (logoutBtn) logoutBtn.hidden = true;
          return;
        }
        var user = AuthClient.getUser();
        if (userEl) {
          userEl.hidden = false;
          userEl.textContent = user && user.username ? ("Zalogowany: " + user.username) : "";
        }
        if (logoutBtn) {
          logoutBtn.hidden = false;
          logoutBtn.onclick = function () { AuthClient.logout(); };
        }
      }

      function showAuthGate(show) {
        var gate = document.getElementById("auth-gate");
        var app = document.getElementById("main-app");
        if (gate) gate.hidden = !show;
        if (app) app.hidden = show;
      }

      function bindAuthGateForm() {
        var form = document.getElementById("auth-gate-form");
        if (!form || form.dataset.bound) return;
        form.dataset.bound = "1";
        form.addEventListener("submit", function (e) {
          e.preventDefault();
          var errEl = document.getElementById("auth-error");
          var btn = document.getElementById("auth-submit");
          if (errEl) errEl.classList.remove("show");
          if (btn) { btn.disabled = true; btn.textContent = "Logowanie…"; }
          AuthClient.login(
            document.getElementById("auth-username").value.trim(),
            document.getElementById("auth-password").value
          ).then(function () {
            showAuthGate(false);
            return PostManager.initFromServer();
          }).then(bootApp).catch(function (err) {
            if (errEl) {
              errEl.textContent = (err && err.message) || "Nie udało się zalogować";
              errEl.classList.add("show");
            }
            if (btn) { btn.disabled = false; btn.textContent = "Zaloguj się"; }
          });
        });
      }

      function bootApp() {
        updateAuthUI();
        render();
      }

      function startWithAuth() {
        AuthClient.requireAuth({ redirect: false })
          .then(function () { return PostManager.initFromServer(); })
          .then(function () {
            showAuthGate(false);
            bootApp();
          })
          .catch(function () {
            showAuthGate(true);
            bindAuthGateForm();
          });
      }

      function getHealthCheck() {
        if (AuthClient.checkHealth) return AuthClient.checkHealth();
        return AuthClient.detectAuthRequired().then(function (auth) {
          return { reachable: !!auth, auth: !!auth };
        });
      }

      function showApiDownMessage() {
        showAuthGate(true);
        bindAuthGateForm();
        var errEl = document.getElementById("auth-error");
        if (errEl) {
          errEl.textContent =
            "API offline — Node.js nie działa. hPanel: typ strony = Node.js Web App (nie zwykły hosting). Build: npm run build. Entry: app.js. Potem Restart.";
          errEl.classList.add("show");
        }
        var btn = document.getElementById("auth-submit");
        if (btn) btn.disabled = true;
      }

      if (window.AuthClient) {
        getHealthCheck().then(function (health) {
          if (AuthClient.isServerMode() && !health.reachable) {
            showApiDownMessage();
            return;
          }
          if (!health.auth) {
            showAuthGate(false);
            bootApp();
            return;
          }
          if (!AuthClient.getToken()) {
            showAuthGate(true);
            bindAuthGateForm();
            return;
          }
          startWithAuth();
        });
      } else {
        showAuthGate(false);
        bootApp();
      }
    })();
  </script>
</body>
</html>
