<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>Logowanie — Content System</title>
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("content-system-theme");
        document.documentElement.setAttribute("data-theme", saved === "dark" ? "dark" : "light");
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base: #f4f6f9;
      --bg-card: #ffffff;
      --border: #d8dee8;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --accent: #1d4ed8;
      --accent-strong: #1e40af;
      --accent-dim: rgba(29, 78, 216, 0.1);
      --danger: #dc2626;
      --input-bg: #f8fafc;
      --radius: 10px;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --logo-from: #1d4ed8;
      --logo-to: #0ea5e9;
    }
    html[data-theme="dark"] {
      --bg-base: #0b1220;
      --bg-card: #151c2c;
      --border: #2a3548;
      --text-primary: #e8eef8;
      --text-secondary: #9aa8bc;
      --accent: #3b82f6;
      --accent-strong: #60a5fa;
      --accent-dim: rgba(59, 130, 246, 0.16);
      --danger: #f87171;
      --input-bg: #0f172a;
      --shadow: 0 12px 36px rgba(0, 0, 0, 0.45);
      --logo-from: #2563eb;
      --logo-to: #06b6d4;
    }
    html, body {
      min-height: 100%;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(ellipse 80% 55% at 50% -8%, rgba(29, 78, 216, 0.14), transparent 55%),
        var(--bg-base);
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .login-logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--logo-from), var(--logo-to));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .login-logo-icon svg { width: 22px; height: 22px; }
    .login-logo h1 { font-size: 18px; font-weight: 600; }
    .login-logo p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text-primary);
      font-size: 14px;
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .login-btn {
      width: 100%;
      margin-top: 8px;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-btn:hover { background: var(--accent-strong); }
    .login-btn:disabled { opacity: 0.6; cursor: wait; }
    .login-error {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(220, 38, 38, 0.1);
      color: var(--danger);
      font-size: 13px;
      display: none;
    }
    .login-error.show { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </div>
      <div>
        <h1>Content System</h1>
        <p>Zaloguj się, aby wejść do panelu</p>
      </div>
    </div>
    <form id="login-form">
      <div class="field">
        <label for="username">Login</label>
        <input type="text" id="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Hasło</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" id="login-btn">Zaloguj się</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>

  <script src="auth-client.js?v=7"></script>
  <script>
    (function () {
      var form = document.getElementById("login-form");
      var errEl = document.getElementById("login-error");
      var btn = document.getElementById("login-btn");

      if (AuthClient.isServerMode()) {
        var healthCheck = AuthClient.checkHealth || function () {
          return AuthClient.detectAuthRequired().then(function (auth) {
            return { reachable: !!auth, auth: !!auth };
          });
        };
        healthCheck().then(function (health) {
          if (!health.reachable) {
            errEl.innerHTML =
              "Brak serwera API na Hostingerze (tylko hosting plików). " +
              "<a href=\"./\" style=\"color:var(--accent)\">Wejdź do panelu bez logowania →</a>";
            errEl.classList.add("show");
            btn.disabled = true;
          }
        });
      }

      if (AuthClient.getToken()) {
        AuthClient.requireAuth().then(function () {
          window.location.href = AuthClient.getHomeUrl();
        }).catch(function () { /* form */ });
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        errEl.classList.remove("show");
        btn.disabled = true;
        btn.textContent = "Logowanie…";

        AuthClient.login(
          document.getElementById("username").value.trim(),
          document.getElementById("password").value
        ).then(function () {
          window.location.href = AuthClient.getHomeUrl();
        }).catch(function (err) {
          errEl.textContent = (err && err.message) || "Nie udało się zalogować";
          errEl.classList.add("show");
          btn.disabled = false;
          btn.textContent = "Zaloguj się";
        });
      });
    })();
  </script>
</body>
</html>
