<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logowanie — Content System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base: #0a0a0f;
      --bg-card: #16161f;
      --border: #252532;
      --text-primary: #e8e8f0;
      --text-secondary: #9898a8;
      --accent: #6366f1;
      --accent-purple: #8b5cf6;
      --danger: #ef4444;
      --radius: 10px;
    }
    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99, 102, 241, 0.18), transparent),
        var(--bg-base);
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .login-logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-purple));
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-logo-icon svg { width: 22px; height: 22px; }
    .login-logo h1 { font-size: 18px; font-weight: 600; }
    .login-logo p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0f0f16;
      color: var(--text-primary);
      font-size: 14px;
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    .login-btn {
      width: 100%;
      margin-top: 8px;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-purple));
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-btn:hover { opacity: 0.92; }
    .login-btn:disabled { opacity: 0.6; cursor: wait; }
    .login-error {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(239, 68, 68, 0.12);
      color: #fca5a5;
      font-size: 13px;
      display: none;
    }
    .login-error.show { display: block; }
    .login-hint {
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </div>
      <div>
        <h1>Content System</h1>
        <p>Zaloguj się do panelu</p>
      </div>
    </div>

    <form id="login-form">
      <div class="field">
        <label for="username">Login</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Hasło</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" id="login-btn">Zaloguj się</button>
        <div class="login-error" id="login-error"></div>
      </form>
    </div>

  <script src="auth-client.js"></script>
  <script>
    (function () {
      if (AuthClient.getToken()) {
        AuthClient.requireAuth().then(function () {
          window.location.href = "/";
        }).catch(function () { /* form */ });
      }

      var form = document.getElementById("login-form");
      var errEl = document.getElementById("login-error");
      var btn = document.getElementById("login-btn");

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        errEl.classList.remove("show");
        btn.disabled = true;
        btn.textContent = "Logowanie…";

        AuthClient.login(
          document.getElementById("username").value.trim(),
          document.getElementById("password").value
        ).then(function () {
          window.location.href = "/";
        }).catch(function (err) {
          errEl.textContent = (err && err.message) || "Nie udało się zalogować";
          errEl.classList.add("show");
          btn.disabled = false;
          btn.textContent = "Zaloguj się";
        });
      });
    })();
  </script>
</body>
</html>
